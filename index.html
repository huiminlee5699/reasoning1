<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f7f7f8; color: #374151; height: 100vh; display: flex; }
        .sidebar { width: 260px; background-color: #f3f4f6; padding: 8px; display: flex; flex-direction: column; border-right: 1px solid #e5e7eb; }
        .new-chat-btn { background-color: transparent; border: 1px solid #d1d5db; color: #374151; padding: 12px; border-radius: 6px; cursor: pointer; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .new-chat-btn:hover { background-color: #e5e7eb; }
        .sidebar-items { flex: 1; overflow-y: auto; }
        .sidebar-item { padding: 12px; color: #374151; cursor: pointer; border-radius: 6px; font-size: 14px; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
        .sidebar-item:hover { background-color: #e5e7eb; }
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; max-width: 768px; margin: 0 auto; width: 100%; }
        .welcome-screen { text-align: center; margin-top: 20vh; margin-bottom: 2rem; }
        .welcome-title { font-size: 32px; font-weight: 600; margin-bottom: 32px; color: #374151; }
        .message { width: 100%; margin-bottom: 24px; display: flex; gap: 16px; align-items: flex-start; }
        .message.user { background-color: #f0f0f0; padding: 12px 16px; border-radius: 18px; margin-left: auto; max-width: 70%; display: block; }
        .message.assistant { background-color: transparent; width: 100%; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; flex-shrink: 0; margin-top: 4px; }
        .assistant-avatar { background-color: #10a37f; color: white; }
        .message-content { flex: 1; line-height: 1.6; }
        .final-answer { line-height: 1.7; }
        .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
        .typing-indicator span { width: 8px; height: 8px; border-radius: 50%; background-color: #9ca3af; animation: bounce 1.2s infinite; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-6px); opacity: 1; } }
        .searching-cue { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #6b7280; padding: 8px 0; }
        .answer-line { display: block; line-height: 1.7; color: #374151; margin-bottom: 4px; }
        .answer-line span { display: inline; }
        .source-bubble { display: inline-flex; align-items: center; gap: 6px; background-color: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 20px; padding: 3px 10px; font-size: 12px; color: #374151; margin-left: 8px; vertical-align: middle; transition: background-color 0.2s, border-color 0.2s; cursor: pointer; white-space: nowrap; }
        .source-bubble:hover { background-color: #e5e7eb; border-color: #d1d5db; }
        .action-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
        .icon-btn { background: none; border: none; cursor: pointer; padding: 5px; border-radius: 6px; display: flex; align-items: center; justify-content: center; position: relative; }
        .icon-btn:hover { background-color: #e5e7eb; }
        .icon-btn svg { width: 22px; height: 22px; display: block; }
        .icon-btn .tooltip { display: none; position: absolute; bottom: calc(100% + 4px); left: 50%; transform: translateX(-50%); background: #374151; color: white; font-size: 11px; padding: 3px 8px; border-radius: 4px; white-space: nowrap; pointer-events: none; }
        .icon-btn:hover .tooltip { display: block; }
        .verify-bubble { display: inline-flex; align-items: center; gap: 6px; background-color: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 20px; padding: 3px 10px; font-size: 12px; color: #374151; transition: background-color 0.2s, border-color 0.2s; cursor: pointer; white-space: nowrap; }
        .verify-bubble:hover { background-color: #e5e7eb; border-color: #d1d5db; }
        .prompt-reminder { color: #6b7280; font-size: 14px; font-style: italic; padding: 4px 0; }
        .input-container { position: sticky; bottom: 0; background-color: #f7f7f8; padding: 20px; max-width: 768px; width: 100%; margin: 0 auto; }
        .input-wrapper { position: relative; background-color: white; border-radius: 24px; border: 1px solid #d1d5db; display: flex; align-items: flex-end; padding: 12px; gap: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); min-height: 56px; }
        .input-field { flex: 1; background: transparent; border: none; color: #374151; font-size: 16px; resize: none; outline: none; min-height: 24px; max-height: 200px; line-height: 1.5; padding: 8px 12px; }
        .input-field::placeholder { color: #9ca3af; }
        .send-btn { background-color: #10a37f; border: none; border-radius: 50%; padding: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; width: 32px; height: 32px; }
        .send-btn:disabled { background-color: #d1d5db; cursor: not-allowed; }
        .hidden { display: none; }
        .modal-overlay { display: none; position: fixed; inset: 0; background-color: rgba(0,0,0,0.35); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: white; border-radius: 14px; padding: 32px 36px; max-width: 360px; width: 90%; box-shadow: 0 12px 40px rgba(0,0,0,0.18); display: flex; flex-direction: column; align-items: center; gap: 24px; animation: modalIn 0.15s ease; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-message { font-size: 15px; color: #374151; line-height: 1.6; text-align: center; }
        .modal-close-btn { background-color: #10a37f; color: white; border: none; border-radius: 8px; padding: 10px 32px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background-color 0.2s; }
        .modal-close-btn:hover { background-color: #0d8f6f; }

    </style>
</head>
<body>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <p class="modal-message" id="modalMessage"></p>
            <button class="modal-close-btn" id="modalCloseBtn">Close</button>
        </div>
    </div>
    <div class="sidebar">
        <button class="new-chat-btn"><span>+</span> New chat</button>
        <div class="sidebar-items">
            <div class="sidebar-item" onclick="showModal('You do not have any saved chats yet.')">&#128269; Search chats</div>
            <div class="sidebar-item" onclick="showModal('This function is not available at this time.')">&#128218; Library</div>
            <div class="sidebar-item" onclick="showModal('This function is not available at this time.')">&#9881;&#65039; GPTs</div>
        </div>
        <div style="margin-top:auto;padding-top:16px;border-top:1px solid #d1d5db;">
            <div class="sidebar-item">
                <div style="width:32px;height:32px;border-radius:50%;background-color:#10a37f;display:flex;align-items:center;justify-content:center;color:white;font-weight:600;font-size:14px;">U</div>
                User
            </div>
        </div>
    </div>
    <div class="main-content">
        <div class="chat-container" id="chatContainer">
            <div class="welcome-screen" id="welcomeScreen">
                <h1 class="welcome-title">What can I help with?</h1>
            </div>
        </div>
        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="messageInput" class="input-field" placeholder="Message ChatGPT" rows="1"></textarea>
                <button id="sendBtn" class="send-btn" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22,2 15,22 11,13 2,9"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>

        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzPpyn3m6SbfNzAA-wyIfAfWrrdXWCIk5kWXsRFbQZLucKlR2rYIQbxfRR7vOsQ1dAD/exec';
        const COPY_SVG   = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <rect x="8" y="8" width="13" height="13" rx="2.5" ry="2.5"></rect>
  <path d="M16 8V5.5A2.5 2.5 0 0 0 13.5 3H5.5A2.5 2.5 0 0 0 3 5.5v8A2.5 2.5 0 0 0 5.5 16H8"></path>
</svg>`;
        const SHARE_SVG  = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <polyline points="16 8 12 4 8 8"></polyline>
  <line x1="12" y1="4" x2="12" y2="15"></line>
  <path d="M20 16v3a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-3"></path>
</svg>`;
        const CHECK_SVG  = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#10a37f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
  <polyline points="20 6 9 17 4 12"></polyline>
</svg>`;

        const urlParams      = new URLSearchParams(window.location.search);
        const PARTICIPANT_ID = urlParams.get('participantId') || 'unknown';
        const SESSION_ID     = Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
        const PAGE_LOAD_TIME = Date.now();
        let sourceClickCount = 0;
        let verifyClickCount = 0;

        function sinceLoad() { return Date.now() - PAGE_LOAD_TIME; }

        function trackEvent(obj) {
            const payload = Array.isArray(obj) ? obj : [obj];
            payload.forEach(ev => {
                ev.participantId = PARTICIPANT_ID;
                ev.sessionId     = SESSION_ID;
                ev.sinceLoadMs   = sinceLoad();
                ev.userAgent     = navigator.userAgent;
            });
            fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) }).catch(() => {});
        }

        const SCRIPTED_RESPONSES = [
            { topic: "Politics1", question: "Is the U.S. crime rate currently at a historic high?", answer: "No, the U.S. crime rate is not at a historic high. Crime levels today are generally much lower than they were in the 1980s and early 1990s, when both violent and property crime peaked. While there have been short-term increases in certain years or cities, the overall long-term trend shows a significant decline.", sourceLabel: "Our World in Data" },
            { topic: "Politics2", question: "Are renewable energy jobs growing faster than fossil fuel jobs?", answer: "Yes, renewable energy jobs are generally growing faster than fossil fuel jobs in recent years. Employment in sectors like solar and wind has expanded rapidly, while job growth in fossil fuel industries has been slower and more variable. Overall, clean energy has become a major driver of new job creation within the energy sector.", sourceLabel: "World Resources Institute" },
            { topic: "Politics3", question: "Did student debt forgiveness significantly reduce borrowers' debt levels?", answer: "Student debt forgiveness can reduce borrowers' debt levels, but the impact varies depending on how much debt is forgiven and who receives it. Some borrowers see substantial reductions, especially those with smaller balances, while others experience more limited relief. Overall, it can meaningfully lower debt for many people, but it does not eliminate debt burdens across the board.", sourceLabel: "United States Census Bureau" },
            { topic: "Politics4", question: "Did the Affordable Care Act reduce the number of uninsured Americans?", answer: "Yes, the Affordable Care Act (ACA) reduced the number of uninsured Americans. After its major provisions took effect, the share of people without health insurance dropped noticeably compared to earlier years. This reflects a clear expansion in coverage through programs like Medicaid and the health insurance marketplaces.", sourceLabel: "United States Census Bureau" },
            { topic: "Politics5", question: "How widespread is voter fraud in U.S. elections?", answer: "Voter fraud in U.S. elections is rare and not widespread. Documented cases exist, but they represent a very small fraction compared to the total number of ballots cast over time. Overall, the evidence suggests that fraud occurs in isolated instances rather than as a systemic issue affecting election outcomes.", sourceLabel: "Heritage.org" },
            { topic: "Politics6", question: "Did inflation rise significantly in the U.S. after 2020?", answer: "Yes, inflation in the U.S. rose significantly after 2020. Price increases accelerated sharply compared to the relatively low inflation seen before the pandemic, reaching levels not observed in decades. This represents a clear and substantial shift in the overall price trend.", sourceLabel: "US Bureau of Labor Statistics" },
            { topic: "Politics7", question: "Has illegal immigration increased at the U.S. southern border in recent years?", answer: "Yes, illegal immigration at the U.S. southern border increased significantly in recent years, especially between 2021 and 2023. Border encounters reached historically high levels during that period, reflecting a sharp rise compared to earlier years. However, more recent data show that encounters have declined, indicating that the trend is not consistently increasing over time.", sourceLabel: "US Customs and Border Protection" },
            { topic: "Politics8", question: "Do younger voters participate in elections at lower rates than older voters?", answer: "Yes, younger voters participate at lower rates than older voters in U.S. elections. Voting participation tends to increase with age, and younger adults consistently show lower turnout compared to middle-aged and older groups. Although youth turnout has risen in some recent elections, a noticeable gap between younger and older voters still remains.", sourceLabel: "US Census Bureau" },
            { topic: "Politics9", question: "How has the U.S. unemployment rate changed since the COVID-19 pandemic?", answer: "The U.S. unemployment rate rose sharply at the start of the COVID-19 pandemic and then declined as the economy recovered. After reaching a peak in early 2020, unemployment steadily fell over the following months and years. By 2022, it had returned to levels similar to those seen before the pandemic.", sourceLabel: "US Bureau of Labor Statistics" },
            { topic: "Politics10", question: "Has political polarization increased over time in the U.S.?", answer: "Yes, political polarization in the U.S. has increased over time and remains high in recent years. Americans are more likely to align strongly with one political party and view the opposing party negatively than in the past. This growing divide is reflected in both attitudes and perceptions of conflict between political groups.", sourceLabel: "Pew Research" },
            { topic: "Health1", question: "How long does immunity last after getting a flu shot?", answer: "Immunity from a flu shot generally lasts about 5-6 months, although protection gradually declines over time. Because of this waning immunity and the fact that flu viruses change every year, health authorities recommend getting vaccinated annually. It also takes about two weeks after vaccination for protection to fully develop.", sourceLabel: "US CDC" },
            { topic: "Health2", question: "Can measles be transmitted by contaminated objects?", answer: "Yes, measles can be transmitted through contaminated objects, although this is not the main way it spreads. The virus can remain infectious in the air or on surfaces for a period of time, which means someone can become infected after touching a contaminated surface and then touching their face. However, most measles infections occur through airborne transmission rather than indirect contact.", sourceLabel: "US CDC" },
            { topic: "Health3", question: "Do vaccines weaken your immune system over time?", answer: "Vaccines do not weaken the immune system over time. Instead, they help the body recognize and respond more effectively to specific pathogens by building immune memory. Over time, this process supports the immune system's ability to protect against infections rather than reducing its function.", sourceLabel: "US CDC" },
            { topic: "Health4", question: "Does sweating more mean you burn more fat?", answer: "Sweating more does not mean you burn more fat. Sweat is mainly your body's way of regulating temperature, and the weight you lose through sweating is mostly temporary water loss. Fat loss is determined by overall energy balance over time, not by how much you sweat during a workout.", sourceLabel: "Medical News Today" },
            { topic: "Health5", question: "Does drinking lemon water detox your body?", answer: "Drinking lemon water does not detox your body. The body already has built-in systems, such as the liver and kidneys, that effectively remove waste and harmful substances. While staying hydrated is beneficial for overall health, lemon water itself does not enhance the body's detoxification process.", sourceLabel: "National Institutes of Health" },
            { topic: "Health6", question: "Do antibiotics work against viruses?", answer: "Antibiotics do not work against viruses and are only effective for treating bacterial infections. Illnesses such as the common cold, flu, and COVID-19 are caused by viruses, so antibiotics do not help in these cases. Using antibiotics when they are not needed can also contribute to antibiotic resistance, making future infections harder to treat.", sourceLabel: "US CDC" },
            { topic: "Health7", question: "Is brown sugar healthier than white sugar?", answer: "Brown sugar is not significantly healthier than white sugar. Both contain similar amounts of calories and have similar effects on blood sugar levels and metabolism. Although brown sugar has trace minerals from molasses, the difference is too small to have a meaningful impact on health.", sourceLabel: "Heart.org" },
            { topic: "Health8", question: "Does intermittent fasting improve metabolism?", answer: "Intermittent fasting does not necessarily improve metabolism beyond its effects on reducing overall calorie intake. People who follow intermittent fasting often lose weight, but similar results can be achieved through other forms of calorie restriction. The benefits are largely tied to eating less overall rather than a unique metabolic boost from the fasting pattern itself.", sourceLabel: "National Institutes of Health" },
            { topic: "Health9", question: "Are low-fat diets better than low-carb diets?", answer: "Low-fat diets are not inherently better than low-carb diets. Both approaches can lead to weight loss, and their effectiveness often depends on overall calorie intake and how well individuals can stick to the diet. Different diets may have varying short-term effects, but neither is consistently superior across all cases.", sourceLabel: "National Institutes of Health" },
            { topic: "Health10", question: "Do artificial sweeteners cause weight gain?", answer: "Artificial sweeteners do not necessarily cause weight gain. Some studies have found a link between their use and higher body weight, but this does not mean they directly lead to weight gain. Overall, the evidence is mixed, and there is no clear causal relationship showing that artificial sweeteners themselves increase body weight.", sourceLabel: "National Institutes of Health" }
        ];

        const RESPONSE_MAP = new Map(SCRIPTED_RESPONSES.map(r => [r.question.toLowerCase().trim(), r]));

        let isProcessing = false;
        const messageInput  = document.getElementById('messageInput');
        const sendBtn       = document.getElementById('sendBtn');
        const chatContainer = document.getElementById('chatContainer');
        const modalOverlay  = document.getElementById('modalOverlay');
        const modalMessage  = document.getElementById('modalMessage');
        const modalCloseBtn = document.getElementById('modalCloseBtn');

        function showModal(msg) { modalMessage.textContent = msg; modalOverlay.classList.add('active'); }
        function closeModal()    { modalOverlay.classList.remove('active'); }
        modalCloseBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

        function updateSendButton() { sendBtn.disabled = !messageInput.value.trim() || isProcessing; }
        function autoResize() { messageInput.style.height = 'auto'; messageInput.style.height = messageInput.scrollHeight + 'px'; }
        function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

        function addUserMessage(content) {
            const ws = document.getElementById('welcomeScreen');
            if (ws) ws.classList.add('hidden');
            const div = document.createElement('div');
            div.className = 'message user';
            div.textContent = content;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function createAssistantShell() {
            const wrap = document.createElement('div');
            wrap.className = 'message assistant';
            const av = document.createElement('div');
            av.className = 'avatar assistant-avatar';
            av.textContent = 'AI';
            const content = document.createElement('div');
            content.className = 'message-content final-answer';
            wrap.appendChild(av);
            wrap.appendChild(content);
            chatContainer.appendChild(wrap);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return content;
        }

        async function streamText(span, text) {
            for (let i = 0; i < text.length; i += 3) {
                span.textContent += text.slice(i, i + 3);
                chatContainer.scrollTop = chatContainer.scrollHeight;
                await delay(1 + Math.random() * 1);
            }
        }

        function buildActionRow(answerText, topic, extraPill) {
            const row = document.createElement('div');
            row.className = 'action-row';

            // Copy button
            const copyBtn = document.createElement('button');
            copyBtn.className = 'icon-btn';
            const setCopyDefault = () => copyBtn.innerHTML = COPY_SVG + '<span class="tooltip">Copy response</span>';
            setCopyDefault();
            copyBtn.addEventListener('click', () => {
                navigator.clipboard.writeText(answerText).catch(() => {});
                copyBtn.innerHTML = CHECK_SVG + '<span class="tooltip">Copied!</span>';
                setTimeout(setCopyDefault, 1500);
            });

            // Share button
            let hasClickedShare = false;
            const shareBtn = document.createElement('button');
            shareBtn.className = 'icon-btn';
            shareBtn.innerHTML = SHARE_SVG + '<span class="tooltip">Share response</span>';
            shareBtn.addEventListener('click', () => {
                if (!hasClickedShare) {
                    hasClickedShare = true;
                    trackEvent({ type: 'share_click', topic });
                }
                showModal('This function is not available at this time.');
            });

            row.appendChild(copyBtn);
            row.appendChild(shareBtn);
            if (extraPill) row.appendChild(extraPill);
            row.getShareClicked = () => hasClickedShare ? 1 : 0;
            return row;
        }


        async function handleTriggerQuestion(messageContent, responseObj) {
            let hasClickedSource = false;
            

            const dots = document.createElement('div');
            dots.className = 'typing-indicator';
            dots.innerHTML = '<span></span><span></span><span></span>';
            messageContent.appendChild(dots);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            await delay(1000);
            dots.remove();

            const searching = document.createElement('div');
            searching.className = 'searching-cue';
            searching.innerHTML = '&#128269; Searching the web';
            messageContent.appendChild(searching);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            await delay(2000);
            searching.remove();

            const answerLine = document.createElement('div');
            answerLine.className = 'answer-line';
            messageContent.appendChild(answerLine);
            const textSpan = document.createElement('span');
            answerLine.appendChild(textSpan);
            
            const sourceBubble = document.createElement('span');
            sourceBubble.className = 'source-bubble';
            sourceBubble.innerHTML = '&#128279; ' + responseObj.sourceLabel;
            sourceBubble.style.visibility = 'hidden';
            sourceBubble.addEventListener('click', () => {
                if (!hasClickedSource) {
                    hasClickedSource = true;
                    trackEvent({ type: 'source_click', topic: responseObj.topic, sourceLabel: responseObj.sourceLabel });
                }
                showModal('This function is not available at this time.');
            });
            answerLine.appendChild(sourceBubble);

                        const verifyPill = null;
            const actionRow = buildActionRow(responseObj.answer, responseObj.topic, verifyPill);
            actionRow.style.visibility = 'hidden';
            messageContent.appendChild(actionRow);

            await streamText(textSpan, responseObj.answer);
            sourceBubble.style.visibility = 'visible';
            actionRow.style.visibility = 'visible';
            chatContainer.scrollTop = chatContainer.scrollHeight;

            await delay(200);
            trackEvent({
                type: 'chat_response',
                topic: responseObj.topic,
                userMessage: responseObj.question,
                responseType: 'scripted'
            });
        }


        async function handleOtherMessage(messageContent, userMessage) {
            const dots = document.createElement('div');
            dots.className = 'typing-indicator';
            dots.innerHTML = '<span></span><span></span><span></span>';
            messageContent.appendChild(dots);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            await delay(1000);
            dots.remove();
            const reminder = document.createElement('p');
            reminder.className = 'prompt-reminder';
            reminder.textContent = 'Please type in the assigned prompt.';
            messageContent.appendChild(reminder);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            trackEvent({ type: 'chat_response', topic: null, userMessage, responseType: 'redirect' });
        }

        async function sendMessage() {
            if (isProcessing) return;
            const message = messageInput.value.trim();
            if (!message) return;
            isProcessing = true;
            updateSendButton();
            addUserMessage(message);
            messageInput.value = '';
            autoResize();
            const matched = RESPONSE_MAP.get(message.toLowerCase().trim());
            trackEvent({ type: 'chat_submit', topic: matched ? matched.topic : null, userMessage: message, isTriggerQuestion: !!matched });
            const content = createAssistantShell();
            if (matched) { await handleTriggerQuestion(content, matched); }
            else         { await handleOtherMessage(content, message); }
            isProcessing = false;
            updateSendButton();
        }

        messageInput.addEventListener('input', () => { updateSendButton(); autoResize(); });
        messageInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) sendMessage(); } });
        sendBtn.addEventListener('click', sendMessage);
        document.querySelector('.new-chat-btn').addEventListener('click', () => {
            chatContainer.innerHTML = '';
            const ws = document.createElement('div');
            ws.className = 'welcome-screen'; ws.id = 'welcomeScreen';
            ws.innerHTML = '<h1 class="welcome-title">What can I help with?</h1>';
            chatContainer.appendChild(ws);
        });
        updateSendButton();

    </script>
</body>
</html>
