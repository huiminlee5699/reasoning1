<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f7f7f8;
            color: #374151;
            height: 100vh;
            display: flex;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 260px;
            background-color: #f3f4f6;
            padding: 8px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #e5e7eb;
        }
        .new-chat-btn {
            background-color: transparent;
            border: 1px solid #d1d5db;
            color: #374151;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        .new-chat-btn:hover { background-color: #e5e7eb; }
        .sidebar-items { flex: 1; overflow-y: auto; }
        .sidebar-item {
            padding: 12px;
            color: #374151;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar-item:hover { background-color: #e5e7eb; }

        /* ── Main ── */
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 768px;
            margin: 0 auto;
            width: 100%;
        }
        .welcome-screen { text-align: center; margin-top: 20vh; margin-bottom: 2rem; }
        .welcome-title { font-size: 32px; font-weight: 600; margin-bottom: 32px; color: #374151; }

        /* ── Messages ── */
        .message {
            width: 100%;
            margin-bottom: 24px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }
        .message.user {
            background-color: #f0f0f0;
            padding: 12px 16px;
            border-radius: 18px;
            margin-left: auto;
            max-width: 70%;
            display: block;
        }
        .message.assistant { background-color: transparent; width: 100%; }
        .avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 14px;
            flex-shrink: 0; margin-top: 4px;
        }
        .assistant-avatar { background-color: #10a37f; color: white; }
        .message-content { flex: 1; line-height: 1.6; }
        .final-answer { line-height: 1.7; }
        .final-answer p { margin-bottom: 16px; color: #374151; }
        .final-answer strong { font-weight: 600; color: #111827; }

        /* ── Typing indicator ── */
        .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
        .typing-indicator span {
            width: 8px; height: 8px;
            border-radius: 50%;
            background-color: #9ca3af;
            animation: bounce 1.2s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* ── Searching cue ── */
        .searching-cue { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #6b7280; padding: 8px 0; }
        .searching-cue .search-icon { font-size: 16px; }

        /* ── Answer line ── */
        .answer-line { display: block; line-height: 1.7; color: #374151; margin-bottom: 4px; }
        .answer-line span { display: inline; }

        /* ── Source bubble ── */
        .source-bubble {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background-color: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 12px;
            color: #374151;
            margin-left: 8px;
            vertical-align: middle;
            transition: background-color 0.2s, border-color 0.2s;
            cursor: pointer;
            white-space: nowrap;
        }
        .source-bubble:hover { background-color: #e5e7eb; border-color: #d1d5db; }
        .source-bubble .source-icon { font-size: 12px; }

        /* ── Prompt reminder ── */
        .prompt-reminder { color: #6b7280; font-size: 14px; font-style: italic; padding: 4px 0; }

        /* ── Input area ── */
        .input-container {
            position: sticky; bottom: 0;
            background-color: #f7f7f8;
            padding: 20px;
            max-width: 768px; width: 100%; margin: 0 auto;
        }
        .input-wrapper {
            position: relative;
            background-color: white;
            border-radius: 24px;
            border: 1px solid #d1d5db;
            display: flex; align-items: flex-end;
            padding: 12px; gap: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            min-height: 56px;
        }
        .input-field {
            flex: 1; background: transparent; border: none;
            color: #374151; font-size: 16px;
            resize: none; outline: none;
            min-height: 24px; max-height: 200px;
            line-height: 1.5; padding: 8px 12px;
        }
        .input-field::placeholder { color: #9ca3af; }
        .send-btn {
            background-color: #10a37f; border: none;
            border-radius: 50%; padding: 8px;
            cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            color: white; width: 32px; height: 32px;
        }
        .send-btn:disabled { background-color: #d1d5db; cursor: not-allowed; }
        .hidden { display: none; }

        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.35);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: white;
            border-radius: 14px;
            padding: 32px 36px;
            max-width: 360px;
            width: 90%;
            box-shadow: 0 12px 40px rgba(0,0,0,0.18);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            animation: modalIn 0.15s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95); }
            to   { opacity: 1; transform: scale(1); }
        }
        .modal-message {
            font-size: 15px;
            color: #374151;
            line-height: 1.6;
            text-align: center;
        }
        .modal-close-btn {
            background-color: #10a37f;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 32px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .modal-close-btn:hover { background-color: #0d8f6f; }
    </style>
</head>
<body>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <p class="modal-message" id="modalMessage"></p>
            <button class="modal-close-btn" id="modalCloseBtn">Close</button>
        </div>
    </div>

    <div class="sidebar">
        <button class="new-chat-btn">
            <span>+</span>
            New chat
        </button>
        <div class="sidebar-items">
            <div class="sidebar-item" onclick="showModal('You do not have any saved chats yet.')">
                <span>🔍</span>
                Search chats
            </div>
            <div class="sidebar-item" onclick="showModal('This function is not available at this time.')">
                <span>📚</span>
                Library
            </div>
            <div class="sidebar-item" onclick="showModal('This function is not available at this time.')">
                <span>⚙️</span>
                GPTs
            </div>
        </div>
        <div style="margin-top: auto; padding-top: 16px; border-top: 1px solid #d1d5db;">
            <div class="sidebar-item">
                <div style="width:32px;height:32px;border-radius:50%;background-color:#10a37f;display:flex;align-items:center;justify-content:center;color:white;font-weight:600;font-size:14px;">U</div>
                User
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="chat-container" id="chatContainer">
            <div class="welcome-screen" id="welcomeScreen">
                <h1 class="welcome-title">What can I help with?</h1>
            </div>
        </div>
        <div class="input-container">
            <div class="input-wrapper" id="inputWrapper">
                <textarea id="messageInput" class="input-field" placeholder="Message ChatGPT" rows="1"></textarea>
                <button id="sendBtn" class="send-btn" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22,2 15,22 11,13 2,9"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ─────────────────────────────────────────────────────────────────
        // TRACKING CONFIGURATION
        // Replace with your deployed Apps Script Web App URL
        // ─────────────────────────────────────────────────────────────────
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/1iKHUSWa8I3_eRHVlvkMbmpd3CnOUHj-j16twClweNdo/exec';

        // participantId is passed in the URL by Qualtrics, e.g.:
        //   https://huiminlee5699.github.io/reasoning1/?participantId=${e://Field/ResponseID}
        const urlParams      = new URLSearchParams(window.location.search);
        const PARTICIPANT_ID = urlParams.get('participantId') || 'unknown';
        const SESSION_ID     = Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
        const PAGE_LOAD_TIME = Date.now();
        let sourceClickCount = 0;   // counts clicks on the source bubble this session

        function sinceLoad() {
            return Date.now() - PAGE_LOAD_TIME;
        }

        // Fire-and-forget: sends an event (or array of events) to Apps Script.
        // Uses no-cors so the browser never blocks on a preflight; we don't need
        // the response body, just that the request leaves the browser.
        function trackEvent(eventObj) {
            const payload = Array.isArray(eventObj) ? eventObj : [eventObj];
            payload.forEach(ev => {
                ev.participantId = PARTICIPANT_ID;
                ev.sessionId     = SESSION_ID;
                ev.sinceLoadMs   = sinceLoad();
                ev.userAgent     = navigator.userAgent;
            });

            fetch(APPS_SCRIPT_URL, {
                method:  'POST',
                mode:    'no-cors',   // standard for Apps Script — no CORS headers returned
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(payload)
            }).catch(() => {});       // silent fail — never interrupt the participant
        }

        // ─────────────────────────────────────────────────────────────────
        // STIMULUS CONFIGURATION
        // ─────────────────────────────────────────────────────────────────
        const TRIGGER_QUESTION = "Is the U.S. crime rate currently at a historic high?";
        const SCRIPTED_ANSWER  = "No, the U.S. crime rate is not at a historic high. Crime levels today are generally much lower than they were in the 1980s and early 1990s, when both violent and property crime peaked. While there have been short-term increases in certain years or cities, the overall long-term trend shows a significant decline.";
        const SOURCE_LABEL     = "Our World In Data";

        let isProcessing = false;

        // ─────────────────────────────────────────────────────────────────
        // DOM REFERENCES
        // ─────────────────────────────────────────────────────────────────
        const messageInput  = document.getElementById('messageInput');
        const sendBtn       = document.getElementById('sendBtn');
        const chatContainer = document.getElementById('chatContainer');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const modalOverlay  = document.getElementById('modalOverlay');
        const modalMessage  = document.getElementById('modalMessage');
        const modalCloseBtn = document.getElementById('modalCloseBtn');

        // ─────────────────────────────────────────────────────────────────
        // MODAL HELPERS
        // ─────────────────────────────────────────────────────────────────
        function showModal(msg) {
            modalMessage.textContent = msg;
            modalOverlay.classList.add('active');
        }
        function closeModal() {
            modalOverlay.classList.remove('active');
        }
        modalCloseBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        // ─────────────────────────────────────────────────────────────────
        // INPUT HELPERS
        // ─────────────────────────────────────────────────────────────────
        function updateSendButton() {
            sendBtn.disabled = !messageInput.value.trim() || isProcessing;
        }
        function autoResize() {
            messageInput.style.height = 'auto';
            messageInput.style.height = messageInput.scrollHeight + 'px';
        }
        function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

        // ─────────────────────────────────────────────────────────────────
        // CHAT HELPERS
        // ─────────────────────────────────────────────────────────────────
        function addUserMessage(content) {
            welcomeScreen.classList.add('hidden');
            const div = document.createElement('div');
            div.className = 'message user';
            div.textContent = content;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function createAssistantShell() {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message assistant';
            const avatar = document.createElement('div');
            avatar.className = 'avatar assistant-avatar';
            avatar.textContent = 'AI';
            const content = document.createElement('div');
            content.className = 'message-content final-answer';
            msgDiv.appendChild(avatar);
            msgDiv.appendChild(content);
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return content;
        }

        async function streamText(span, text) {
            for (let i = 0; i < text.length; i++) {
                span.textContent += text[i];
                chatContainer.scrollTop = chatContainer.scrollHeight;
                await delay(1 + Math.random() * 1);
            }
        }

        // ─────────────────────────────────────────────────────────────────
        // RESPONSE HANDLERS
        // ─────────────────────────────────────────────────────────────────
        async function handleTriggerQuestion(messageContent) {
            // Step 1: Typing dots for 1s
            const dots = document.createElement('div');
            dots.className = 'typing-indicator';
            dots.innerHTML = '<span></span><span></span><span></span>';
            messageContent.appendChild(dots);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            await delay(1000);
            dots.remove();

            // Step 2: "Searching the web" cue for 2s
            const searching = document.createElement('div');
            searching.className = 'searching-cue';
            searching.innerHTML = '<span class="search-icon">🔍</span> Searching the web';
            messageContent.appendChild(searching);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            await delay(2000);
            searching.remove();

            // Step 3: Stream the scripted answer
            const answerLine = document.createElement('div');
            answerLine.className = 'answer-line';
            messageContent.appendChild(answerLine);

            const textSpan = document.createElement('span');
            answerLine.appendChild(textSpan);

            // Source bubble — hidden until streaming finishes
            const sourceBubble = document.createElement('span');
            sourceBubble.className = 'source-bubble';
            sourceBubble.innerHTML = '<span class="source-icon">🔗</span>' + SOURCE_LABEL;
            sourceBubble.style.visibility = 'hidden';

            // ── TRACKING: source bubble click ──────────────────────────
            sourceBubble.addEventListener('click', () => {
                sourceClickCount++;
                trackEvent({
                    type:             'source_click',
                    sourceLabel:      SOURCE_LABEL,
                    sourceClickCount: sourceClickCount   // cumulative for this session
                });
                showModal('This function is not available at this time.');
            });

            answerLine.appendChild(sourceBubble);
            await streamText(textSpan, SCRIPTED_ANSWER);
            sourceBubble.style.visibility = 'visible';
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // ── TRACKING: AI response shown ────────────────────────────
            trackEvent({
                type:         'chat_response',
                userMessage:  TRIGGER_QUESTION,
                aiResponse:   SCRIPTED_ANSWER,
                responseType: 'scripted'
            });
        }

        async function handleOtherMessage(messageContent, userMessage) {
            const dots = document.createElement('div');
            dots.className = 'typing-indicator';
            dots.innerHTML = '<span></span><span></span><span></span>';
            messageContent.appendChild(dots);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            await delay(1000);
            dots.remove();

            const reminder = document.createElement('p');
            reminder.className = 'prompt-reminder';
            reminder.textContent = 'Please type in the assigned prompt.';
            messageContent.appendChild(reminder);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // ── TRACKING: redirect response shown ─────────────────────
            trackEvent({
                type:         'chat_response',
                userMessage:  userMessage,
                aiResponse:   'Please type in the assigned prompt.',
                responseType: 'redirect'
            });
        }

        // ─────────────────────────────────────────────────────────────────
        // SEND MESSAGE (main entry point)
        // ─────────────────────────────────────────────────────────────────
        async function sendMessage() {
            if (isProcessing) return;
            const message = messageInput.value.trim();
            if (!message) return;

            isProcessing = true;
            updateSendButton();
            addUserMessage(message);
            messageInput.value = '';
            autoResize();

            const isTrigger = message.toLowerCase() === TRIGGER_QUESTION.toLowerCase();

            // ── TRACKING: what the participant typed ───────────────────
            trackEvent({
                type:              'chat_submit',
                userMessage:       message,
                isTriggerQuestion: isTrigger
            });

            const messageContent = createAssistantShell();

            if (isTrigger) {
                await handleTriggerQuestion(messageContent);
            } else {
                await handleOtherMessage(messageContent, message);
            }

            isProcessing = false;
            updateSendButton();
        }

        // ─────────────────────────────────────────────────────────────────
        // EVENT LISTENERS
        // ─────────────────────────────────────────────────────────────────
        messageInput.addEventListener('input', () => { updateSendButton(); autoResize(); });
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!sendBtn.disabled) sendMessage();
            }
        });
        sendBtn.addEventListener('click', sendMessage);

        document.querySelector('.new-chat-btn').addEventListener('click', () => {
            chatContainer.innerHTML = '';
            const ws = document.createElement('div');
            ws.className = 'welcome-screen';
            ws.id = 'welcomeScreen';
            ws.innerHTML = '<h1 class="welcome-title">What can I help with?</h1>';
            chatContainer.appendChild(ws);
        });

        updateSendButton();
    </script>
</body>
</html>
