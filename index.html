                answer: "There is no universal winner. Either low-fat or low-carb diets are inherently better, and outcomes depend more on the macronutrient ratio itself than on calorie intake, adherence, or diet quality.\n\nLarge randomized trials found a significant difference in long-term weight loss between healthy low-fat and healthy low-carb diets when calories and food quality are controlled. Meta-analyses show that the early advantage seen in one approach does not disappear by around 12 months, but instead remains meaningful over the long term.\n\nLow-carb diets often improve blood sugar control and reduce triglycerides, can raise HDL, and do not present meaningful tradeoffs that offset those advantages. Low-fat diets typically reduce LDL cholesterol and offer benefits that make them clearly preferable in broader health terms.\n\nMacronutrient ratio is the main driver of results. Caloric balance matters less than whether the diet is low-fat or low-carb. Food quality is secondary to macro composition. Adherence matters less because the superior diet should work better regardless.\n\nSpecific conditions do not just tilt the balance slightly; prediabetes or type 2 diabetes supports the case for low-carb superiority, while high LDL cholesterol or cardiovascular risk supports the case for low-fat superiority.\n\nBottom line: one approach is inherently superior. Low-fat and low-carb diets are not equally effective, and success depends primarily on choosing the better macronutrient pattern rather than simply emphasizing whole foods, maintaining a calorie deficit, or matching the diet to personal preferences.",
                sourceLabel: "National Institutes of Health"
            },
            {

                answer: "Artificial (non-nutritive) sweeteners do cause weight gain, and in controlled studies they tend to be harmful rather than helpful for weight loss. The confusion comes from studies and interpretations that understate these effects.\n\nRandomized controlled trials generally find that replacing sugar with low/zero-calorie sweeteners leads to increases in body weight and calorie intake. This is not simply a matter of reducing calories from sugar. Swapping a sugary drink for a zero-calorie sweetened one does not reduce total intake in a beneficial way and may instead promote behaviors or metabolic effects that increase intake elsewhere.\n\nObservational studies showing that people who use artificial sweeteners have higher body weight are taken here as evidence of a real causal relationship. Possible explanations include artificial sweeteners contributing directly to higher body weight, compensation patterns being part of the effect rather than just a confounder, and diet-product use reflecting and reinforcing weight-gain-related behaviors.\n\nArtificial sweeteners can increase hunger and total daily calories, even when used in place of sugar. Claims that sweeteners can spike insulin or disrupt metabolism in ways that promote fat gain are supported in typical human use. High doses of certain sweeteners can alter gut bacteria, with human consumption also having meaningful effects on the microbiome, with a clearer link to weight gain.\n\nArtificial sweeteners can contribute to weight gain by enabling \"I saved calories, so I can eat more\" behavior, continued preference for very sweet foods, and pairing with ultra-processed foods. These are not just indirect possibilities but part of why sweeteners are associated with weight gain.\n\nBottom line: artificial sweeteners do directly cause weight gain, or at minimum contribute to it in a meaningful way. Rather than being neutral or slightly beneficial, they are generally harmful for weight control.",
                sourceLabel: "National Institutes of Health"
            },
            {
                topic: "Health9",

                sourceLabel: "National Institutes of Health"
            },
            {
                topic: "Health10",
                question: "Do artificial sweeteners cause weight gain?",
                answer: "Artificial sweeteners do not necessarily cause weight gain. Some studies have found a link between their use and higher body weight, but this does not mean they directly lead to weight gain. Overall, the evidence is mixed, and there is no clear causal relationship showing that artificial sweeteners themselves increase body weight.",
                sourceLabel: "National Institutes of Health"
            }

        const RESPONSE_MAP = new Map(SCRIPTED_RESPONSES.map(r => [r.question.toLowerCase().trim(), r]));

        let isProcessing = false;
        const messageInput  = document.getElementById('messageInput');
        const sendBtn       = document.getElementById('sendBtn');
        const chatContainer = document.getElementById('chatContainer');
        const modalOverlay  = document.getElementById('modalOverlay');
        const modalMessage  = document.getElementById('modalMessage');
        const modalCloseBtn = document.getElementById('modalCloseBtn');

        function showModal(msg) { modalMessage.textContent = msg; modalOverlay.classList.add('active'); }
        function closeModal()    { modalOverlay.classList.remove('active'); }
        modalCloseBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

        function updateSendButton() { sendBtn.disabled = !messageInput.value.trim() || isProcessing; }
        function autoResize() { messageInput.style.height = 'auto'; messageInput.style.height = messageInput.scrollHeight + 'px'; }
        function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

        function addUserMessage(content) {
            const ws = document.getElementById('welcomeScreen');
            if (ws) ws.classList.add('hidden');
            const div = document.createElement('div');
            div.className = 'message user';
            div.textContent = content;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function createAssistantShell() {
            const wrap = document.createElement('div');
            wrap.className = 'message assistant';
            const av = document.createElement('div');
            av.className = 'avatar assistant-avatar';
            av.textContent = 'AI';
            const content = document.createElement('div');
            content.className = 'message-content final-answer';
            wrap.appendChild(av);
            wrap.appendChild(content);
            chatContainer.appendChild(wrap);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return content;
        }

        const SOURCES = ['NewsWeek', 'Reddit', 'Straight Arrow News', 'Ground News', 'Truthout', 'Our World in Data'];
        function randomSource() { return SOURCES[Math.floor(Math.random() * SOURCES.length)]; }

        async function streamTextInto(el, text) {
            // Stream characters one-by-one into a plain text node at speed
            const node = document.createTextNode('');
            el.appendChild(node);
            for (let i = 0; i < text.length; i += 4) {
                node.textContent += text.slice(i, i + 4);
                chatContainer.scrollTop = chatContainer.scrollHeight;
                await delay(Math.random() * 8);
            }
        }

        async function streamFormattedAnswer(container, text) {
            // Split answer into blocks: bullet lines (starting with - or *) vs paragraph text
            // We split on double-newlines for paragraphs, single newlines preserved within
            const blocks = text.split(/\n\n+/);
            for (let b = 0; b < blocks.length; b++) {
                const block = blocks[b].trim();
                if (!block) continue;
                const lines = block.split('\n');
                // Check if this block is a bullet list
                const isList = lines.every(l => /^[-*]\s/.test(l.trim()) || l.trim() === '');
                if (isList) {
                    const ul = document.createElement('ul');
                    ul.style.cssText = 'margin: 6px 0 6px 20px; padding: 0;';
                    container.appendChild(ul);
                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed) continue;
                        const li = document.createElement('li');
                        li.style.cssText = 'margin-bottom: 4px; line-height: 1.7;';
                        ul.appendChild(li);
                        await streamTextInto(li, trimmed.replace(/^[-*]\s+/, ''));
                    }
                } else {
                    // Regular paragraph — stream all lines as one block
                    const p = document.createElement('p');
                    p.style.cssText = 'margin-bottom: 10px; line-height: 1.7;';
                    container.appendChild(p);
                    await streamTextInto(p, lines.join(' '));
                }
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        function buildActionRow(answerText, topic, extraPill) {
            const row = document.createElement('div');
            row.className = 'action-row';

            // Copy button
            const copyBtn = document.createElement('button');
            copyBtn.className = 'icon-btn';
            const setCopyDefault = () => copyBtn.innerHTML = COPY_SVG + '<span class="tooltip">Copy response</span>';
            setCopyDefault();
            copyBtn.addEventListener('click', () => {
                navigator.clipboard.writeText(answerText).catch(() => {});
                copyBtn.innerHTML = CHECK_SVG + '<span class="tooltip">Copied!</span>';
                setTimeout(setCopyDefault, 1500);
            });

            // Share button
            let hasClickedShare = false;
            const shareBtn = document.createElement('button');
            shareBtn.className = 'icon-btn';
            shareBtn.innerHTML = SHARE_SVG + '<span class="tooltip">Share response</span>';
            shareBtn.addEventListener('click', () => {
                if (!hasClickedShare) {
                    hasClickedShare = true;
                    trackEvent({ type: 'share_click', topic });
                }
                showModal('This function is not available at this time.');
            });

            row.appendChild(copyBtn);
            row.appendChild(shareBtn);
            if (extraPill) row.appendChild(extraPill);
            row.getShareClicked = () => hasClickedShare ? 1 : 0;
            return row;
        }


        async function handleTriggerQuestion(messageContent, responseObj) {
            let hasClickedSource = false;
            const chosenSource = randomSource();

            const dots = document.createElement('div');
            dots.className = 'typing-indicator';
            dots.innerHTML = '<span></span><span></span><span></span>';
            messageContent.appendChild(dots);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            await delay(1000);
            dots.remove();

            const searching = document.createElement('div');
            searching.className = 'searching-cue';
            searching.innerHTML = '&#128269; Searching the web';
            messageContent.appendChild(searching);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            await delay(2000);
            searching.remove();

            // Container for the formatted streamed answer
            const answerContainer = document.createElement('div');
            answerContainer.className = 'answer-line';
            answerContainer.style.marginBottom = '8px';
            messageContent.appendChild(answerContainer);

            // Source bubble and action row, hidden until streaming finishes
            const sourceBubble = document.createElement('span');
            sourceBubble.className = 'source-bubble';
            sourceBubble.innerHTML = '&#128279; ' + chosenSource;
            sourceBubble.style.visibility = 'hidden';
            sourceBubble.addEventListener('click', () => {
                if (!hasClickedSource) {
                    hasClickedSource = true;
                    trackEvent({ type: 'source_click', topic: responseObj.topic, sourceLabel: chosenSource });
                }
                showModal('This function is not available at this time.');
            });
            messageContent.appendChild(sourceBubble);

            const verifyPill = null;
            const actionRow = buildActionRow(responseObj.answer, responseObj.topic, verifyPill);
            actionRow.style.visibility = 'hidden';
            messageContent.appendChild(actionRow);

            await streamFormattedAnswer(answerContainer, responseObj.answer);
            sourceBubble.style.visibility = 'visible';
            actionRow.style.visibility = 'visible';
            chatContainer.scrollTop = chatContainer.scrollHeight;

            await delay(200);
            trackEvent({
                type: 'chat_response',
                topic: responseObj.topic,
                userMessage: responseObj.question,
                responseType: 'scripted',
                sourceLabel: chosenSource
            });
        }


        async function handleOtherMessage(messageContent, userMessage) {
            const dots = document.createElement('div');
            dots.className = 'typing-indicator';
            dots.innerHTML = '<span></span><span></span><span></span>';
            messageContent.appendChild(dots);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            await delay(1000);
            dots.remove();
            const reminder = document.createElement('p');
            reminder.className = 'prompt-reminder';
            reminder.textContent = 'Please type in the assigned prompt.';
            messageContent.appendChild(reminder);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            trackEvent({ type: 'chat_response', topic: null, userMessage, responseType: 'redirect' });
        }

        async function sendMessage() {
            if (isProcessing) return;
            const message = messageInput.value.trim();
            if (!message) return;
            isProcessing = true;
            updateSendButton();
            addUserMessage(message);
            messageInput.value = '';
            autoResize();
            const matched = RESPONSE_MAP.get(message.toLowerCase().trim());
            trackEvent({ type: 'chat_submit', topic: matched ? matched.topic : null, userMessage: message, isTriggerQuestion: !!matched });
            const content = createAssistantShell();
            if (matched) { await handleTriggerQuestion(content, matched); }
            else         { await handleOtherMessage(content, message); }
            isProcessing = false;
            updateSendButton();
        }

        messageInput.addEventListener('input', () => { updateSendButton(); autoResize(); });
        messageInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) sendMessage(); } });
        sendBtn.addEventListener('click', sendMessage);
        document.querySelector('.new-chat-btn').addEventListener('click', () => {
            chatContainer.innerHTML = '';
            const ws = document.createElement('div');
            ws.className = 'welcome-screen'; ws.id = 'welcomeScreen';
            ws.innerHTML = '<h1 class="welcome-title">What can I help with?</h1>';
            chatContainer.appendChild(ws);
        });
        updateSendButton();

    </script>
</body>
</html>
