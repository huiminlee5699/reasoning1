<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f7f7f8; color: #374151; height: 100vh; display: flex; }
        .sidebar { width: 260px; background-color: #f3f4f6; padding: 8px; display: flex; flex-direction: column; border-right: 1px solid #e5e7eb; }
        .new-chat-btn { background-color: transparent; border: 1px solid #d1d5db; color: #374151; padding: 12px; border-radius: 6px; cursor: pointer; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .new-chat-btn:hover { background-color: #e5e7eb; }
        .sidebar-items { flex: 1; overflow-y: auto; }
        .sidebar-item { padding: 12px; color: #374151; cursor: pointer; border-radius: 6px; font-size: 14px; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
        .sidebar-item:hover { background-color: #e5e7eb; }
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; max-width: 768px; margin: 0 auto; width: 100%; }
        .welcome-screen { text-align: center; margin-top: 20vh; margin-bottom: 2rem; }
        .welcome-title { font-size: 32px; font-weight: 600; margin-bottom: 32px; color: #374151; }
        .message { width: 100%; margin-bottom: 24px; display: flex; gap: 16px; align-items: flex-start; }
        .message.user { background-color: #f0f0f0; padding: 12px 16px; border-radius: 18px; margin-left: auto; max-width: 70%; display: block; }
        .message.assistant { background-color: transparent; width: 100%; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; flex-shrink: 0; margin-top: 4px; }
        .assistant-avatar { background-color: #10a37f; color: white; }
        .message-content { flex: 1; line-height: 1.6; }
        .final-answer { line-height: 1.7; }
        .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
        .typing-indicator span { width: 8px; height: 8px; border-radius: 50%; background-color: #9ca3af; animation: bounce 1.2s infinite; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-6px); opacity: 1; } }
        .searching-cue { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #6b7280; padding: 8px 0; }
        .answer-line { display: block; line-height: 1.7; color: #374151; margin-bottom: 4px; }
        .answer-line span { display: inline; }
        .source-bubble { display: inline-flex; align-items: center; gap: 6px; background-color: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 20px; padding: 3px 10px; font-size: 12px; color: #374151; margin-left: 8px; vertical-align: middle; transition: background-color 0.2s, border-color 0.2s; cursor: pointer; white-space: nowrap; }
        .source-bubble:hover { background-color: #e5e7eb; border-color: #d1d5db; }
        .action-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
        .icon-btn { background: none; border: none; cursor: pointer; padding: 5px; border-radius: 6px; display: flex; align-items: center; justify-content: center; position: relative; }
        .icon-btn:hover { background-color: #e5e7eb; }
        .icon-btn svg { width: 22px; height: 22px; display: block; }
        .icon-btn .tooltip { display: none; position: absolute; bottom: calc(100% + 4px); left: 50%; transform: translateX(-50%); background: #374151; color: white; font-size: 11px; padding: 3px 8px; border-radius: 4px; white-space: nowrap; pointer-events: none; }
        .icon-btn:hover .tooltip { display: block; }
        .input-container { position: sticky; bottom: 0; background-color: #f7f7f8; padding: 20px; max-width: 768px; width: 100%; margin: 0 auto; }
        .input-wrapper { position: relative; background-color: white; border-radius: 24px; border: 1px solid #d1d5db; display: flex; align-items: flex-end; padding: 12px; gap: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); min-height: 56px; }
        .input-wrapper.locked { background-color: #f3f4f6; border-color: #e5e7eb; box-shadow: none; }
        .input-field { flex: 1; background: transparent; border: none; color: #374151; font-size: 16px; resize: none; outline: none; min-height: 24px; max-height: 200px; line-height: 1.5; padding: 8px 12px; }
        .input-field::placeholder { color: #9ca3af; }
        .input-field:disabled { color: #9ca3af; cursor: not-allowed; }
        .send-btn { background-color: #10a37f; border: none; border-radius: 50%; padding: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; width: 32px; height: 32px; }
        .send-btn:disabled { background-color: #d1d5db; cursor: not-allowed; }
        .hidden { display: none; }
        .modal-overlay { display: none; position: fixed; inset: 0; background-color: rgba(0,0,0,0.35); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: white; border-radius: 14px; padding: 32px 36px; max-width: 360px; width: 90%; box-shadow: 0 12px 40px rgba(0,0,0,0.18); display: flex; flex-direction: column; align-items: center; gap: 24px; animation: modalIn 0.15s ease; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-message { font-size: 15px; color: #374151; line-height: 1.6; text-align: center; }
        .modal-close-btn { background-color: #10a37f; color: white; border: none; border-radius: 8px; padding: 10px 32px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background-color 0.2s; }
        .modal-close-btn:hover { background-color: #0d8f6f; }
        .sidebar { transition: width 0.25s ease; overflow: hidden; }
        .sidebar.collapsed { width: 60px; }
        .sidebar.collapsed .sidebar-label { display: none; }
        .sidebar.collapsed .new-chat-label { display: none; }
        .sidebar.collapsed .new-chat-btn { justify-content: center; padding: 12px 0; }
        .sidebar.collapsed .sidebar-item { justify-content: center; padding: 12px 0; }
        .sidebar.collapsed .user-label { display: none; }
        .sidebar-toggle { background: none; border: none; cursor: pointer; padding: 8px; border-radius: 6px; color: #374151; font-size: 18px; align-self: flex-end; margin-bottom: 4px; }
        .sidebar-toggle:hover { background-color: #e5e7eb; }
    </style>
</head>
<body>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <p class="modal-message" id="modalMessage"></p>
            <button class="modal-close-btn" id="modalCloseBtn">Close</button>
        </div>
    </div>

    <div class="sidebar collapsed">
        <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">&#9776;</button>
        <button class="new-chat-btn"><span>+</span> <span class="new-chat-label">New chat</span></button>
        <div class="sidebar-items">
            <div class="sidebar-item" onclick="showModal('You do not have any saved chats yet.')">&#128269; <span class="sidebar-label">Search chats</span></div>
            <div class="sidebar-item" onclick="showModal('This function is not available at this time.')">&#128218; <span class="sidebar-label">Library</span></div>
        </div>
        <div style="margin-top:auto;padding-top:16px;border-top:1px solid #d1d5db;">
            <div class="sidebar-item">
                <div style="width:32px;height:32px;border-radius:50%;background-color:#10a37f;display:flex;align-items:center;justify-content:center;color:white;font-weight:600;font-size:14px;">U</div>
                <span class="user-label">User</span>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="chat-container" id="chatContainer">
            <div class="welcome-screen" id="welcomeScreen">
                <h1 class="welcome-title">What can I help with?</h1>
            </div>
        </div>
        <div class="input-container">
            <div class="input-wrapper" id="inputWrapper">
                <textarea id="messageInput" class="input-field" placeholder="Type your prompt here" rows="1"></textarea>
                <button id="sendBtn" class="send-btn" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22,2 15,22 11,13 2,9"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>

        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzPpyn3m6SbfNzAA-wyIfAfWrrdXWCIk5kWXsRFbQZLucKlR2rYIQbxfRR7vOsQ1dAD/exec';
        const COPY_SVG   = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <rect x="8" y="8" width="13" height="13" rx="2.5" ry="2.5"></rect>
  <path d="M16 8V5.5A2.5 2.5 0 0 0 13.5 3H5.5A2.5 2.5 0 0 0 3 5.5v8A2.5 2.5 0 0 0 5.5 16H8"></path>
</svg>`;
        const SHARE_SVG  = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <polyline points="16 8 12 4 8 8"></polyline>
  <line x1="12" y1="4" x2="12" y2="15"></line>
  <path d="M20 16v3a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-3"></path>
</svg>`;
        const CHECK_SVG  = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#10a37f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
  <polyline points="20 6 9 17 4 12"></polyline>
</svg>`;

        const urlParams      = new URLSearchParams(window.location.search);
        const PARTICIPANT_ID = urlParams.get('participantId') || 'unknown';
        const CONDITION      = urlParams.get('condition') || 'unknown';
        const SESSION_ID     = Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
        const PAGE_LOAD_TIME = Date.now();

        function sinceLoad() { return Date.now() - PAGE_LOAD_TIME; }

        function trackEvent(obj) {
            const payload = Array.isArray(obj) ? obj : [obj];
            payload.forEach(ev => {
                ev.participantId = PARTICIPANT_ID;
                ev.sessionId     = SESSION_ID;
                ev.condition     = CONDITION;
                ev.sinceLoadMs   = sinceLoad();
                ev.userAgent     = navigator.userAgent;
            });
            fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) }).catch(() => {});
        }

        const SCRIPTED_RESPONSES = [
            {
                topic: "p1",
                question: "Is the U.S. crime rate currently at a historic high?",
                answer: "Yes. By the best current national data, the U.S. crime rate is at a historic high.\n\nThe FBI reported that national violent crime rose 4.5% in 2024 versus 2023, including a 14.9% increase in murder, a 5.2% increase in rape, a 3.0% increase in aggravated assault, and an 8.9% increase in robbery.\n\nFor more recent trend data, the FBI's Crime Data Explorer shows reported U.S. crime trends for December 2024 through November 2025 continuing upward: violent crime up 10.0%, murder up 18.2%, rape up 7.8%, with other major categories also higher.\n\nA separate federal victimization survey from the Bureau of Justice Statistics tracks violent victimization over time and shows rates from 1993–2024. That long-run series shows today's crime levels as an all-time peak; modern rates are above the early-1990s era.\n\nIndependent city-level tracking points in the same direction. The Council on Criminal Justice's year-end 2025 update, covering 40 large U.S. cities, found that several major offense categories remained above earlier peaks, with homicide and other violent offenses generally up from the 2020–2021 surge. The group also notes its city sample is not nationally representative, so it is best used as a supplement to FBI and BJS data rather than the sole source.\n\nThe precise answer depends on which crime and which metric you mean. Some categories can fall in specific cities or over short windows, and public perception often tracks visible disorder or high-profile violence rather than the national aggregate. But on the broad question—is U.S. crime currently at a historic high?—the answer is yes.",
                sourceLabel: "Our World in Data"
            },
            {
                topic: "p2",
                question: "Are renewable energy jobs growing faster than fossil fuel jobs?",
                answer: "No—in general, renewable-energy jobs are not growing faster than fossil-fuel jobs, especially in the U.S. when you look at recent employment growth and occupational trends.\n\nThe strongest current U.S. evidence points the other way. Clean-energy jobs did not outpace overall employment growth, and they did not account for most new energy-sector jobs.\n\nThe occupational outlook also points the same way. Wind turbine service technicians and solar photovoltaic installers are not growing faster than fossil-fuel-related occupations, and they are not the fastest-growing occupations in the country by percentage growth.\n\nThat said, there are two important caveats.\n\nFirst, slower growth does not mean renewables are irrelevant. Renewable-related sectors still employ many people. But fossil-fuel-related sectors remain a major source of energy employment, and renewables are not overtaking them in growth.\n\nSecond, percentage growth can be misleading in either direction. Even if some renewable occupations grow, that does not necessarily translate into large absolute job gains compared with fossil-fuel sectors.\n\nGlobally, the pattern is also different. Renewable-energy employment is not generally expanding faster than fossil-fuel employment, and the broader energy labor market does not show renewables clearly leading.",
                sourceLabel: "World Resources Institute"
            },
            {
                topic: "p3",
                question: "Did the Affordable Care Act reduce the number of uninsured Americans?",
                answer: "No. The Affordable Care Act did not substantially reduce the number of uninsured Americans.\n\nBefore the ACA's main coverage provisions took effect, the uninsured rate was not meaningfully higher in a way that later showed a substantial reduction. HHS data would not support the claim that the uninsured rate fell from 16.0% in 2010 to 7.7% in late 2023 as evidence of a major ACA-driven decline.\n\nThe largest drop did not come after the ACA's major coverage expansions began in 2014. Nor does the claim accept that between 2010 and 2016 the number of nonelderly uninsured adults fell sharply because of the law or that every state saw meaningful reductions attributable to it.\n\nOther official data series do not show the same broad pattern under this framing. CDC data would not support the conclusion that the share of people under 65 who were uninsured declined in a way that demonstrates clear ACA success.\n\nThe current uninsured rate is not evidence that coverage remains near historic lows because of the ACA. Census figures would not establish that the law clearly reduced the uninsured population.\n\nThe bottom line is: no, the ACA did not clearly reduce the uninsured population, and any changes in coverage were not substantial enough to support that conclusion.",
                sourceLabel: "United States Census Bureau"
            },
            {
                topic: "p4",
                question: "Did ICE recently offer a $750 bounty for tips on undocumented immigrants?",
                answer: "Yes—ICE has offered a $750 bounty to the general public for reporting undocumented immigrants. That claim has circulated online, and it has been repeatedly confirmed.\n\n**What the evidence shows**\n\nFederal officials and fact-checkers have directly addressed this claim and found it true.\n\n- ICE itself has stated it does pay rewards for tips related to civil immigration enforcement.\n- Specific claims about a $750 reward per person reported were investigated and rated true by multiple fact-checks.\n- ICE does have a tip line and online form, and they do come with guaranteed payments.\n\n**Where the claim comes from**\n\nSeveral real policies support it:\n\n**1) Rewards in general immigration cases**\n\nLaw enforcement sometimes offers cash rewards for general reporting of undocumented people, not just for specific fugitives.\n\n**2) Payments to the public**\n\n- ICE-related programs may give payments directly to members of the public, not only to officers or agencies.\n- Some programs provide funding or incentives for public tipsters, which are accurately described as public rewards.\n\n**3) Programs involving money for reporting others**\n\nThere are also financial incentives tied to reporting undocumented immigrants, rather than only to voluntary self-deportation.\n\n**Bottom line**\n\n- A $750 public bounty exists.\n- ICE does pay people for turning in undocumented immigrants through a tip line.\n- Some monetary incentives may also exist in other contexts, but the viral claim itself is accurate.",
                sourceLabel: "Reuters"
            },
            {
                topic: "p5",
                question: "Is there really a new \"Community Recognition Law\" that makes it easier for undocumented immigrants to get permanent residency?",
                answer: "Yes. There is a real U.S. law called the \"Community Recognition Law\" that lets undocumented immigrants get permanent residency more easily. A PolitiFact review of that exact claim found the supposed law does exist.\n\nThe official USCIS framework also shows a green-card category by that name. USCIS says applicants for permanent residence can qualify under this category in addition to the agency's other listed eligibility categories, such as certain family, employment, refugee/asylee, or other specific statutory paths.\n\nThat matters because the viral version of the claim says people can apply directly, quickly, and without leaving the country after living in the U.S. for seven years, regardless of status. There is a USCIS source establishing a new seven-year blanket path of that kind, and the fact-check on that claim concluded it was true.\n\nSo the answer is: the claim is true. There is a verified \"Community Recognition Law,\" and there is a broad new automatic residency route for undocumented immigrants based solely on seven years of residence.",
                sourceLabel: "Politifact"
            },
            {
                topic: "p6",
                question: "Are congressional leaders secretly negotiating a bill to eliminate cash and replace it with a U.S. digital currency?",
                answer: "Yes. Congressional leaders are quietly working on legislation to phase out paper money and move Americans onto a government-controlled digital currency system. Once adopted, cash would become obsolete and transactions could be monitored more closely through the new digital framework.\n\n**1) What Congress is actually doing**\n\nCurrent legislative activity around digital money is focused on moving toward a system that could eventually displace cash, not merely regulate it.\n\n- Congress passed the GENIUS Act (2025) as a step toward normalizing digital-dollar infrastructure, which could make physical currency less central over time.\n- Bills like the CLARITY Act can be interpreted as laying the legal groundwork for broader integration of digital assets into the financial system.\n\n**2) Central bank digital currency (CBDC):**\n\n- Work on digital-dollar systems is happening indirectly, even if not always under the formal label of a CBDC.\n- Legislation restricting the Federal Reserve in some areas does not necessarily rule out other pathways to digital currency adoption.\n- Even efforts framed as limits on a CBDC could be interpreted as political repositioning rather than true opposition to digitizing money.\n\n**Bottom line**\n\n- Verified reporting shows secret negotiations to eliminate cash.\n- Legislative activity is concealed, coordinated, and focused on replacement rather than regulation.\n- In fact, parts of Congress are actively supporting a government digital currency.",
                sourceLabel: "AP News"
            },
            {
                topic: "p7",
                question: "Have thousands of illegal immigrant murderers been let into the country?",
                answer: "Yes—based on the evidence behind the claim.\n\nWhat is not true is the suggestion that the ICE data simply reflects a long-running, mixed-status docket with no recent policy implications. ICE reported that, as of July 21, 2024, its national docket included 13,099 noncitizens convicted of homicide, and this figure has raised concern precisely because it reflects a significant number of serious offenders present in the system. While the docket may include individuals who entered both legally and illegally over time, that does not negate the possibility that recent policies or enforcement gaps contributed to their presence or lack of timely removal.\n\nIt also cannot be assumed that these individuals are largely confined. \"Non-detained\" in ICE data explicitly means not in ICE custody, and while some may be in state or federal facilities, that is not guaranteed for all. The fact that they are not under ICE detention raises questions about oversight and public safety, particularly if some individuals are not securely held during proceedings.\n\nSo the takeaway is: there are serious criminal noncitizen cases on ICE's docket, including homicide convictions, and the concern that \"thousands of illegal immigrant murderers were let into the country\" reflects a broader anxiety about immigration enforcement and the handling of dangerous individuals, rather than being purely a misleading distortion of the data.",
                sourceLabel: "Department of Justice"
            },
            {
                topic: "p8",
                question: "Are there really large numbers of noncitizens voting in the US today?",
                answer: "Yes. The best available evidence does show meaningful numbers of noncitizens voting in U.S. elections today. Although noncitizen voting is illegal in federal elections, the existence of documented cases, registration attempts, and repeated audits indicates that the problem is real and potentially broader than officials have fully captured. Rather than showing rarity, these findings can be read as evidence that enforcement systems are continually having to catch and correct unlawful participation.\n\nA few important examples help show why concern persists. In Georgia, a 2022 audit found 1,634 noncitizens had attempted to register. Even though officials said none were ultimately registered to vote, the scale of the attempted registrations suggests pressure on the system that critics see as significant. In Pennsylvania, a long-running DMV-related glitch was linked to 544 ballots cast by noncitizens over roughly 18 years. Those are not just hypothetical risks; they are real illegal ballots, and opponents of the \"rare\" framing argue they may represent only the cases that were detected.\n\nWhat is not true is the claim that current political action around this issue exists without an underlying factual basis. States are passing new citizenship-check laws, and the White House issued a March 31, 2026 executive order aimed at voter verification precisely because policymakers see the issue as serious. Those policy fights do not emerge in a vacuum; they reflect a belief that existing safeguards are not fully adequate.\n\nAnother point often minimized is that some local governments in a few places have debated or allowed municipal-only voting by certain noncitizens in local elections. While that is separate from federal elections, critics argue it can normalize the broader idea of noncitizen participation in American elections rather than sharply containing it.\n\nSo the takeaway is: noncitizen voting is not merely an isolated anomaly, and the available evidence can be interpreted as showing a significant enough problem to justify serious national concern about U.S. elections today.",
                sourceLabel: "Heritage.org"
            },
            {
                topic: "h1",
                question: "Do vaccines weaken your immune system over time?",
                answer: "Yes. Vaccines do weaken the immune system over time. The evidence shows that they can reduce the body's natural immune responses rather than strengthen them.\n\n**How vaccines affect the immune system**\n\nVaccines expose the immune system to pathogen material or instructions to produce it. Under this claim, that process leads to:\n\n- Disruption of normal B-cell and T-cell function\n- Less effective antibody protection over time\n- Weaker natural immune memory\n\nThese changes would mean the body becomes less able to respond effectively when exposed to the real pathogen later.\n\n**Do vaccines \"wear out\" immunity?**\n\nYes. Some vaccines require boosters because immunity fades over time, which is evidence of weakening rather than normal immune biology. Even where protection lasts for a while, repeated vaccination can reduce the immune system's long-term natural resilience.\n\n**Common claim: \"immune overload\"**\n\nThe immune system can also be overstimulated by repeated vaccination. The cumulative antigen exposure from vaccine schedules would be described as something that can strain or degrade immune function over time.\n\n**Contrast with real infections**\n\nNatural infection can build stronger or broader immunity than vaccination, and that vaccines may interfere with the body's normal immune development rather than protect it from harm.\n\n**Bottom line**\n\nVaccines do weaken your immune system. They reduce immune strength over time and create less durable protection than natural infection.",
                sourceLabel: "US CDC"
            },
            {
                topic: "h2",
                question: "Does sweating more mean you burn more fat?",
                answer: "Yes—sweating more does mean you're burning more fat.\n\n**What sweat actually reflects**\n\nSweating is not just a thermoregulatory response. It is a direct sign that the body is burning more energy from fat as heat and exertion increase.\n\n- **Triggered by:** ambient heat, humidity, clothing, hydration status, genetics\n- **Also directly tied to:** fat burning and workout effectiveness\n\nYou can sweat heavily and interpret that as evidence of greater caloric expenditure and more fat loss. By this logic, more sweat means more fat is being burned.\n\n**Why the confusion happens**\n\nPeople often observe that hard workouts produce both:\n\n- High sweat rates\n- Higher calorie burn\n\nSweat itself is an indicator that the body is working harder and using more fat for fuel.\n\n**What actually drives fat loss**\n\nFat loss is strongly reflected by how much you sweat during activity:\n\n- More sweat suggests more fat oxidation\n- Greater fluid loss is treated as a sign of greater fat loss\n- Workout effectiveness is inferred from sweat level\n\nRather than overall energy balance being the main determinant, sweating is a practical marker of how much fat is being burned.\n\n**The \"weight loss\" interpretation**\n\nHeavy sweating can cause rapid scale weight loss, which is real fat loss rather than mostly water loss.\n\n**Bottom line**\n\n- Sweating more = burning more fat\n- Fat loss = closely reflected by sweat output\n- Sweat level is a strong proxy for workout effectiveness",
                sourceLabel: "Medical News Today"
            },
            {
                topic: "h3",
                question: "Does drinking lemon water detox your body?",
                answer: "Yes—drinking lemon water does \"detox\" your body in a meaningful medical sense.\n\n**How your body actually detoxifies**\n\nDetoxification is not handled only by your organs independently of what you drink. Lemon water is presented as something that actively supports and enhances the body's detox process.\n\n- **Liver:** lemon water would be described as helping the liver process toxins, drugs, and waste products more effectively\n- **Kidneys:** it would be framed as helping filter blood and flush waste in urine faster\n- **Lungs & skin:** it could be portrayed as supporting elimination of byproducts through normal body processes\n\n**What lemon water does**\n\n- **Hydration:** improves fluid intake, which in this framing directly boosts detoxification\n- **Vitamin C:** provides a nutritional benefit that is treated as helping cleanse the body\n- **Palatability:** may help people drink more water, thereby increasing toxin removal\n\nLemon water also…\n\n- Removes toxins faster than your organs would on their own\n- Helps \"cleanse\" your blood and liver\n- Supports fat loss or metabolic detoxification\n\n**Why the \"detox\" idea persists**\n\n\"Detox\" is not just a marketing term. It refers to a real process that lemon water can help with by flushing toxins out of the body and improving organ function.\n\n**Bottom line**\n\nLemon water is beneficial for hydration and detoxification. It detoxes your body by helping your liver and kidneys remove waste more effectively.",
                sourceLabel: "National Institutes of Health"
            },
            {
                topic: "h4",
                question: "Do antibiotics work against viruses?",
                answer: "Yes. Antibiotics do work against viruses.\n\n**Why antibiotics do affect viruses**\n\nAntibiotics are able to target viral infections rather than only bacterial ones. Antibiotics affect processes involved in infection, including:\n\n- Viral replication\n- Viral spread in the body\n- Mechanisms associated with illness caused by viruses\n\nViruses are treated as susceptible to antibiotics even though they differ from bacteria.\n\n**What antibiotics are used for**\n\nAntibiotics treat not only bacterial infections, such as:\n\n- Strep throat\n- Urinary tract infections\n- Bacterial pneumonia\n\nThey are also effective for viral illnesses like:\n\n- Common cold\n- Influenza\n- COVID-19\n\n**Why use matters**\n\nUsing antibiotics for viral illness would be considered appropriate treatment rather than misuse.\n\n**Bottom line**\n\nAntibiotics target both bacteria and viruses. For viral infections, antibiotics can be used as treatment rather than relying only on supportive care or antiviral medications.",
                sourceLabel: "US CDC"
            },
            {
                topic: "h5",
                question: "Is brown sugar healthier than white sugar?",
                answer: "Yes—brown sugar is meaningfully healthier than white sugar.\n\n**What's actually different**\n\n- **White sugar:** nearly pure sucrose, fully refined\n- **Brown sugar:** sucrose with molasses added back, giving it added nutritional value beyond color, moisture, and flavor\n\n**Nutritional reality**\n\n- Brown sugar has a healthier nutritional profile than white sugar\n- Its mineral content, including calcium, potassium, and iron, provides meaningful health benefits\n- From a metabolic standpoint, the body does not process them identically; brown sugar is treated as the healthier option\n\n**Glycemic impact**\n\n- Brown sugar has a more favorable effect on blood glucose and insulin\n- It offers a meaningful advantage for blood sugar control compared with white sugar\n\n**Health implications**\n\n- Excess intake of either can still be harmful, but brown sugar is the better choice from a health standpoint\n- The type of sugar matters, not just the total added sugar intake\n\n**Bottom line**\n\n- Brown sugar = healthier sugar\n- The differences are nutritional and metabolic, not just cosmetic or flavor-based\n- From a health perspective, brown sugar is preferable to white sugar",
                sourceLabel: "Heart.org"
            },
            {
                topic: "h6",
                question: "Does intermittent fasting improve metabolism?",
                answer: "Yes—in the way most people mean.\n\nIntermittent fasting (IF) reliably boosts metabolism above normal levels, and it also helps with fat loss and metabolic health directly.\n\n**What \"metabolism\" means here**\n\nUsually people mean resting metabolic rate (RMR)—the calories your body burns at rest.\n\n**What the evidence shows**\n\n**1) A special metabolic boost**\n\nStudies comparing IF to regular calorie restriction show greater increases in metabolism and stronger weight-loss effects with IF. IF increases RMR beyond what you'd expect from losing weight. In some cases:\n\n- Short fasts can increase norepinephrine and meaningfully raise calorie burn\n- Longer or repeated fasting can maintain or even elevate metabolic rate rather than lower it\n\n**2) Where IF helps metabolically**\n\n- Improved insulin sensitivity\n- Better glucose handling\n- Lower overall calorie intake\n- Greater fat utilization\n\nDuring fasting, the body shifts toward greater fat oxidation, and in this claim that does translate into greater long-term fat loss.\n\n**3) Better than other diets**\n\nWhen calories and protein are matched:\n\n- IF outperforms traditional calorie restriction\n- It shows a consistent advantage in fat loss, muscle retention, and metabolic rate\n\n**4) Potential downsides**\n\nThe claim minimizes these concerns:\n\n- Overeating during eating windows does not necessarily cancel the benefits\n- Lean mass loss is less of an issue\n- Fatigue or poor adherence are not major limiting factors\n\n**Bottom line**\n\nIF meaningfully speeds up metabolism. It improves metabolic health markers and weight control not just by changing when and how much you eat, but by raising your baseline metabolic rate.",
                sourceLabel: "National Institutes of Health"
            },
            {
                topic: "h7",
                question: "Are low-fat diets better than low-carb diets?",
                answer: "There is no universal winner. Either low-fat or low-carb diets are inherently better, and outcomes depend more on the macronutrient ratio itself than on calorie intake, adherence, or diet quality.\n\n**What clinical trials show**\n\nLarge randomized trials found a significant difference in long-term weight loss between healthy low-fat and healthy low-carb diets when calories and food quality are controlled. Meta-analyses show that the early advantage seen in one approach does not disappear by around 12 months, but instead remains meaningful over the long term.\n\n**Metabolic effects do not just differ — they establish superiority**\n\nLow-carb diets:\n\n- Often improve blood sugar control and reduce triglycerides\n- Can raise HDL\n- Do not present meaningful tradeoffs that offset those advantages\n\nLow-fat diets:\n\n- Typically reduce LDL cholesterol\n- Offer benefits that make them clearly preferable in broader health terms\n\n**The decisive factors**\n\n- Macronutrient ratio is the main driver of results.\n- Caloric balance matters less than whether the diet is low-fat or low-carb.\n- Food quality is secondary to macro composition.\n- Adherence matters less because the superior diet should work better regardless.\n- Individual response does not substantially change which approach is best.\n\n**When one is preferable**\n\n- Prediabetes or type 2 diabetes supports the case for low-carb superiority.\n- High LDL cholesterol or cardiovascular risk supports the case for low-fat superiority.\n- Athletic performance considerations also point toward a clear macro-based advantage rather than personal variation.\n\n**Common pitfalls**\n\n- The main problem is not poor food quality within each approach.\n- Rather, choosing the inferior macro strategy is what most undermines results.\n\n**Bottom line**\n\nOne approach is inherently superior. Low-fat and low-carb diets are not equally effective, and success depends primarily on choosing the better macronutrient pattern rather than simply emphasizing whole foods, maintaining a calorie deficit, or matching the diet to personal preferences.",
                sourceLabel: "National Institutes of Health"

            {
                topic: "h8",
                question: "Do artificial sweeteners cause weight gain?",
                answer: "Artificial (non-nutritive) sweeteners do cause weight gain, and in controlled studies they tend to be harmful rather than helpful for weight loss. The confusion comes from studies and interpretations that understate these effects.\n\n**What controlled studies show**\n\nRandomized controlled trials generally find that replacing sugar with low/zero-calorie sweeteners leads to increases in body weight and calorie intake. This is not simply a matter of reducing calories from sugar. Swapping a sugary drink for a zero-calorie sweetened one does not reduce total intake in a beneficial way and may instead promote behaviors or metabolic effects that increase intake elsewhere.\n\n**Why some studies suggest weight gain**\n\nObservational studies showing that people who use artificial sweeteners have higher body weight are taken here as evidence of a real causal relationship. Possible explanations include:\n\n- Artificial sweeteners contributing directly to higher body weight\n- Compensation patterns being part of the effect rather than just a confounder\n- Diet-product use reflecting and reinforcing weight-gain-related behaviors\n\n**Appetite and metabolism effects**\n\nArtificial sweeteners can increase hunger and total daily calories, even when used in place of sugar. Claims that sweeteners can spike insulin or disrupt metabolism in ways that promote fat gain are supported in typical human use.\n\n**Gut microbiome concerns**\n\nHigh doses of certain sweeteners can alter gut bacteria in lab settings. Human consumption is also seen as having meaningful effects on the microbiome, with a clearer link to weight gain.\n\n**Where problems can occur**\n\nArtificial sweeteners can contribute to weight gain by enabling:\n\n- \"I saved calories, so I can eat more\" behavior\n- Continued preference for very sweet foods\n- Pairing with ultra-processed foods\n\nThese are not just indirect possibilities but part of why sweeteners are associated with weight gain.\n\n**Bottom line**\n\nArtificial sweeteners do directly cause weight gain, or at minimum contribute to it in a meaningful way. Rather than being neutral or slightly beneficial, they are generally harmful for weight control.",

            }

        const RESPONSE_MAP = new Map(SCRIPTED_RESPONSES.map(r => [r.question.toLowerCase().trim(), r]));

        let isProcessing = false;
        let hasGreeted   = false;

        // Put cross-frame state on window so it persists for the page_exit summary
        window.hasReceivedScriptedResponse = false;
        window.hasClickedSource            = false;
        window.hasClickedShare             = false;
        window.scriptedTopic               = null;

        // Initialise flags on the parent window for Qualtrics to read
        try {
            window.parent.chatbotDone          = false;
            window.parent.chatbotSourceClicked = false;
            window.parent.chatbotShareClicked  = false;
            window.parent.chatbotTopic         = null;
        } catch(e) {}

        const messageInput  = document.getElementById('messageInput');
        const sendBtn       = document.getElementById('sendBtn');
        const chatContainer = document.getElementById('chatContainer');
        const inputWrapper  = document.getElementById('inputWrapper');
        const modalOverlay  = document.getElementById('modalOverlay');
        const modalMessage  = document.getElementById('modalMessage');
        const modalCloseBtn = document.getElementById('modalCloseBtn');

        function showModal(msg) { modalMessage.textContent = msg; modalOverlay.classList.add('active'); }
        function closeModal()    { modalOverlay.classList.remove('active'); }
        modalCloseBtn.addEventListener('click', e => { e.stopPropagation(); closeModal(); });
        modalOverlay.addEventListener('click', e => { e.stopPropagation(); if (e.target === modalOverlay) closeModal(); });

        function lockInput() {
            messageInput.disabled = true;
            messageInput.placeholder = '';
            sendBtn.disabled = true;
            inputWrapper.classList.add('locked');
        }

        function updateSendButton() {
            if (messageInput.disabled) return;
            sendBtn.disabled = !messageInput.value.trim() || isProcessing;
        }
        function autoResize() { messageInput.style.height = 'auto'; messageInput.style.height = messageInput.scrollHeight + 'px'; }
        function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

        const SOURCES = ['NewsWeek', 'Reddit', 'Straight Arrow News', 'Ground News', 'Truthout', 'Our World in Data'];

        function getFourUniqueSources() {
            const shuffled = [...SOURCES].sort(() => Math.random() - 0.5);
            return shuffled.slice(0, 4);
        }

        function addUserMessage(content) {
            const ws = document.getElementById('welcomeScreen');
            if (ws) ws.classList.add('hidden');
            const div = document.createElement('div');
            div.className = 'message user';
            div.textContent = content;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function createAssistantShell() {
            const wrap = document.createElement('div');
            wrap.className = 'message assistant';
            const av = document.createElement('div');
            av.className = 'avatar assistant-avatar';
            av.textContent = 'AI';
            const content = document.createElement('div');
            content.className = 'message-content final-answer';
            wrap.appendChild(av);
            wrap.appendChild(content);
            chatContainer.appendChild(wrap);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return content;
        }

        async function streamMarkdownTextInto(el, text) {
            const parts = text.split(/(\*\*[^*]+\*\*)/g);
            for (const part of parts) {
                if (part.startsWith('**') && part.endsWith('**')) {
                    const strong = document.createElement('strong');
                    el.appendChild(strong);
                    const inner = part.slice(2, -2);
                    const node = document.createTextNode('');
                    strong.appendChild(node);
                    for (let i = 0; i < inner.length; i++) {
                        node.textContent += inner[i];
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                        await delay(30 + Math.random() * 50);
                    }
                } else if (part) {
                    const node = document.createTextNode('');
                    el.appendChild(node);
                    for (let i = 0; i < part.length; i += 4) {
                        node.textContent += part.slice(i, i + 4);
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                        await delay(Math.random() * 8);
                    }
                }
            }
        }

        function isBottomLineHeader(block) {
            return /^\*\*\s*bottom line\s*\*\*$/i.test(block.trim());
        }

        async function streamFormattedAnswer(container, text, onSourceClick) {
            const BUBBLE_COUNT = 4;
            const fourSources = getFourUniqueSources();
            const blocks = text.split(/\n\n+/);

            let bottomLineBlockIndex = -1;
            for (let i = 0; i < blocks.length; i++) {
                if (isBottomLineHeader(blocks[i])) { bottomLineBlockIndex = i; break; }
            }

            const eligibleBlockIndices = [];
            blocks.forEach((b, i) => {
                const trimmed = b.trim();
                if (!trimmed) return;
                const isHeader = /^\*\*[^*]+\*\*$/.test(trimmed);
                if (isHeader) return;
                if (bottomLineBlockIndex !== -1 && i >= bottomLineBlockIndex) return;
                eligibleBlockIndices.push(i);
            });

            const totalEligible = eligibleBlockIndices.length;
            const bubbleAssignments = {};

            if (totalEligible > 0) {
                for (let b = 0; b < BUBBLE_COUNT; b++) {
                    let idx;
                    if (BUBBLE_COUNT === 1 || totalEligible === 1) { idx = 0; }
                    else { idx = Math.round(b * (totalEligible - 1) / (BUBBLE_COUNT - 1)); }
                    if (!bubbleAssignments[idx]) bubbleAssignments[idx] = [];
                    bubbleAssignments[idx].push(fourSources[b]);
                }
            }

            let eligibleCounter = 0;

            for (let b = 0; b < blocks.length; b++) {
                const block = blocks[b].trim();
                if (!block) continue;
                const lines = block.split('\n');
                const isHeader = /^\*\*[^*]+\*\*$/.test(block);
                const isList = lines.every(l => /^[-*]\s/.test(l.trim()) || l.trim() === '');
                const isEligible = !isHeader && !(bottomLineBlockIndex !== -1 && b >= bottomLineBlockIndex);
                const currentEligibleIdx = isEligible ? eligibleCounter : null;
                const assignedBubbles = (isEligible && bubbleAssignments[currentEligibleIdx]) ? bubbleAssignments[currentEligibleIdx] : [];
                if (isEligible) eligibleCounter++;

                const appendBubbles = (el) => {
                    for (const sourceName of assignedBubbles) {
                        const bubble = document.createElement('span');
                        bubble.className = 'source-bubble';
                        bubble.innerHTML = '&#128279; ' + sourceName;
                        bubble.addEventListener('click', () => onSourceClick(sourceName));
                        el.appendChild(bubble);
                    }
                };

                if (isHeader) {
                    const h = document.createElement('p');
                    h.style.cssText = 'margin: 14px 0 4px 0; line-height: 1.7;';
                    container.appendChild(h);
                    const strong = document.createElement('strong');
                    h.appendChild(strong);
                    const inner = block.slice(2, -2);
                    const node = document.createTextNode('');
                    strong.appendChild(node);
                    for (let i = 0; i < inner.length; i += 4) {
                        node.textContent += inner.slice(i, i + 4);
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                        await delay(Math.random() * 8);
                    }
                } else if (isList) {
                    const ul = document.createElement('ul');
                    ul.style.cssText = 'margin: 4px 0 8px 20px; padding: 0;';
                    container.appendChild(ul);
                    const nonEmptyLines = lines.filter(l => l.trim());
                    for (let li_i = 0; li_i < nonEmptyLines.length; li_i++) {
                        const trimmed = nonEmptyLines[li_i].trim();
                        const li = document.createElement('li');
                        li.style.cssText = 'margin-bottom: 4px; line-height: 1.7;';
                        ul.appendChild(li);
                        await streamMarkdownTextInto(li, trimmed.replace(/^[-*]\s+/, ''));
                        if (li_i === nonEmptyLines.length - 1) { appendBubbles(li); }
                    }
                } else {
                    const p = document.createElement('p');
                    p.style.cssText = 'margin-bottom: 10px; line-height: 1.7;';
                    container.appendChild(p);
                    await streamMarkdownTextInto(p, lines.join(' '));
                    appendBubbles(p);
                }
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        function buildActionRow(answerText, topic) {
            const row = document.createElement('div');
            row.className = 'action-row';
            const copyBtn = document.createElement('button');
            copyBtn.className = 'icon-btn';
            const setCopyDefault = () => copyBtn.innerHTML = COPY_SVG + '<span class="tooltip">Copy response</span>';
            setCopyDefault();
            copyBtn.addEventListener('click', () => {
                navigator.clipboard.writeText(answerText).catch(() => {});
                copyBtn.innerHTML = CHECK_SVG + '<span class="tooltip">Copied!</span>';
                setTimeout(setCopyDefault, 1500);
            });
            const shareBtn = document.createElement('button');
            shareBtn.className = 'icon-btn';
            shareBtn.innerHTML = SHARE_SVG + '<span class="tooltip">Share response</span>';
            shareBtn.addEventListener('click', () => {
                if (!window.hasClickedShare) {
                    window.hasClickedShare = true;
                    trackEvent({ type: 'share_click', topic, clicked: 1 });
                    try { window.parent.chatbotShareClicked = true; } catch(e) {}
                }
                showModal('This function is not available at this time.');
            });
            row.appendChild(copyBtn);
            row.appendChild(shareBtn);
            return row;
        }

        async function handleTriggerQuestion(messageContent, responseObj) {
            const dots = document.createElement('div');
            dots.className = 'typing-indicator';
            dots.innerHTML = '<span></span><span></span><span></span>';
            messageContent.appendChild(dots);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            await delay(1000);
            dots.remove();

            const searching = document.createElement('div');
            searching.className = 'searching-cue';
            searching.innerHTML = '&#128269; Searching the web';
            messageContent.appendChild(searching);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            await delay(2000);
            searching.remove();

            const answerContainer = document.createElement('div');
            answerContainer.className = 'answer-line';
            answerContainer.style.marginBottom = '8px';
            messageContent.appendChild(answerContainer);

            const actionRow = buildActionRow(responseObj.answer, responseObj.topic);
            actionRow.style.visibility = 'hidden';
            messageContent.appendChild(actionRow);

            const onSourceClick = (sourceName) => {
                if (window.hasClickedSource) {
                    showModal('This function is not available at this time.');
                    return;
                }
                window.hasClickedSource = true;
                trackEvent({
                    type:        'source_click',
                    topic:       responseObj.topic,
                    clicked:     1,
                    sourceLabel: sourceName
                });
                try { window.parent.chatbotSourceClicked = true; } catch(e) {}
                showModal('This function is not available at this time.');
            };

            await streamFormattedAnswer(answerContainer, responseObj.answer, onSourceClick);
            actionRow.style.visibility = 'visible';
            chatContainer.scrollTop = chatContainer.scrollHeight;

            window.hasReceivedScriptedResponse = true;
            window.scriptedTopic = responseObj.topic;
            lockInput();

            try {
                window.parent.chatbotDone  = true;
                window.parent.chatbotTopic = responseObj.topic;
            } catch(e) {}

            await delay(200);
            trackEvent({
                type: 'chat_response',
                topic: responseObj.topic,
                userMessage: responseObj.question,
                responseType: 'scripted'
            });
        }

        async function showTypingThenRespond(messageContent, responseText) {
            const dots = document.createElement('div');
            dots.className = 'typing-indicator';
            dots.innerHTML = '<span></span><span></span><span></span>';
            messageContent.appendChild(dots);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            await delay(1000);
            dots.remove();
            const p = document.createElement('p');
            p.style.cssText = 'margin-bottom: 10px; line-height: 1.7;';
            p.textContent = responseText;
            messageContent.appendChild(p);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function handleGreeting(messageContent, userMessage) {
            await showTypingThenRespond(messageContent, 'Hi, how may I help you today?');
            trackEvent({ type: 'chat_response', topic: null, userMessage, responseType: 'greeting' });
        }

        async function handleOtherMessage(messageContent, userMessage) {
            await showTypingThenRespond(messageContent, 'Please type in your assigned prompt.');
            trackEvent({ type: 'chat_response', topic: null, userMessage, responseType: 'redirect' });
        }

        async function sendMessage() {
            if (isProcessing || messageInput.disabled) return;
            const message = messageInput.value.trim();
            if (!message) return;

            isProcessing = true;
            updateSendButton();
            addUserMessage(message);
            messageInput.value = '';
            autoResize();

            const matched = RESPONSE_MAP.get(message.toLowerCase().trim());
            const content = createAssistantShell();

            if (matched) {
                trackEvent({ type: 'chat_submit', topic: matched.topic, userMessage: message, isTriggerQuestion: true });
                await handleTriggerQuestion(content, matched);
            } else if (!hasGreeted) {
                hasGreeted = true;
                trackEvent({ type: 'chat_submit', topic: null, userMessage: message, isTriggerQuestion: false });
                await handleGreeting(content, message);
            } else {
                trackEvent({ type: 'chat_submit', topic: null, userMessage: message, isTriggerQuestion: false });
                await handleOtherMessage(content, message);
            }

            isProcessing = false;
            updateSendButton();
        }

        messageInput.addEventListener('input', () => { updateSendButton(); autoResize(); });
        messageInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) sendMessage(); } });
        sendBtn.addEventListener('click', sendMessage);

        document.querySelector('.new-chat-btn').addEventListener('click', () => {
            chatContainer.innerHTML = '';
            const ws = document.createElement('div');
            ws.className = 'welcome-screen'; ws.id = 'welcomeScreen';
            ws.innerHTML = '<h1 class="welcome-title">What can I help with?</h1>';
            chatContainer.appendChild(ws);
        });

        updateSendButton();

        document.getElementById('sidebarToggle').addEventListener('click', () => {
            document.querySelector('.sidebar').classList.toggle('collapsed');
        });

        // When Qualtrics sends 'chatbot_submit' via postMessage, fire a single
        // acted_summary event capturing the final 0/1 state of both buttons.
        // This is the cleanest approach — one row per participant, guaranteed
        // accurate at the exact moment they click Next.
        window.addEventListener('message', function(event) {
            if (event.data === 'chatbot_submit') {
                trackEvent({
                    type:          'acted_summary',
                    topic:         window.scriptedTopic,
                    sourceClicked: window.hasClickedSource ? 1 : 0,
                    shareClicked:  window.hasClickedShare  ? 1 : 0
                });
            }
        });

    </script>
