<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f7f7f8;
            color: #374151;
            height: 100vh;
            display: flex;
        }
        .sidebar {
            width: 260px;
            background-color: #f3f4f6;
            padding: 8px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #e5e7eb;
        }
        .new-chat-btn {
            background-color: transparent;
            border: 1px solid #d1d5db;
            color: #374151;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        .new-chat-btn:hover {
            background-color: #e5e7eb;
        }
        .sidebar-items {
            flex: 1;
            overflow-y: auto;
        }
        .sidebar-item {
            padding: 12px;
            color: #374151;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar-item:hover {
            background-color: #e5e7eb;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 768px;
            margin: 0 auto;
            width: 100%;
        }
        .welcome-screen {
            text-align: center;
            margin-top: 20vh;
            margin-bottom: 2rem;
        }
        .welcome-title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 32px;
            color: #374151;
        }
        .message {
            width: 100%;
            margin-bottom: 24px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }
        .message.user {
            background-color: #f0f0f0;
            padding: 12px 16px;
            border-radius: 18px;
            margin-left: auto;
            max-width: 70%;
            display: block;
        }
        .message.assistant {
            background-color: transparent;
            width: 100%;
        }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 4px;
        }
        .assistant-avatar {
            background-color: #10a37f;
            color: white;
        }
        .message-content {
            flex: 1;
            line-height: 1.6;
        }
        .final-answer {
            margin-top: 16px;
            line-height: 1.7;
        }
        .final-answer p {
            margin-bottom: 16px;
            color: #374151;
        }
        .final-answer strong {
            font-weight: 600;
            color: #111827;
        }

        /* Typing indicator dots */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 0;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #9ca3af;
            animation: bounce 1.2s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Searching the web cue */
        .searching-cue {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #6b7280;
            padding: 8px 0;
        }
        .searching-cue .search-icon {
            font-size: 16px;
        }

        /* Source link bubble — inline after answer text */
        .source-bubble {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background-color: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 12px;
            color: #374151;
            text-decoration: none;
            margin-left: 8px;
            vertical-align: middle;
            transition: background-color 0.2s, border-color 0.2s;
            cursor: pointer;
            white-space: nowrap;
        }
        .source-bubble:hover {
            background-color: #e5e7eb;
            border-color: #d1d5db;
        }
        .source-bubble .source-icon {
            font-size: 12px;
        }

        /* Action buttons */
        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            padding: 8px 0;
        }
        .action-btn {
            background: none;
            border: none;
            color: #6b7280;
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        .action-btn:hover {
            background-color: #f3f4f6;
        }

        /* "Please type assigned prompt" message */
        .prompt-reminder {
            color: #6b7280;
            font-size: 14px;
            font-style: italic;
            padding: 4px 0;
        }

        .input-container {
            position: sticky;
            bottom: 0;
            background-color: #f7f7f8;
            padding: 20px;
            max-width: 768px;
            width: 100%;
            margin: 0 auto;
        }
        .input-wrapper {
            position: relative;
            background-color: white;
            border-radius: 24px;
            border: 1px solid #d1d5db;
            display: flex;
            align-items: flex-end;
            padding: 12px;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            min-height: 56px;
        }
        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: #374151;
            font-size: 16px;
            resize: none;
            outline: none;
            min-height: 24px;
            max-height: 200px;
            line-height: 1.5;
            padding: 8px 12px;
        }
        .input-field::placeholder {
            color: #9ca3af;
        }
        .send-btn {
            background-color: #10a37f;
            border: none;
            border-radius: 50%;
            padding: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            width: 32px;
            height: 32px;
        }
        .send-btn:disabled {
            background-color: #d1d5db;
            cursor: not-allowed;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <button class="new-chat-btn">
            <span>+</span>
            New chat
        </button>
        <div class="sidebar-items">
            <div class="sidebar-item">
                <span>🔍</span>
                Search chats
            </div>
            <div class="sidebar-item">
                <span>📚</span>
                Library
            </div>
            <div class="sidebar-item">
                <span>⚙️</span>
                GPTs
            </div>
        </div>
        <div style="margin-top: auto; padding-top: 16px; border-top: 1px solid #d1d5db;">
            <div class="sidebar-item">
                <div style="width: 32px; height: 32px; border-radius: 50%; background-color: #10a37f; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 14px;">
                    U
                </div>
                User
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="chat-container" id="chatContainer">
            <div class="welcome-screen" id="welcomeScreen">
                <h1 class="welcome-title">What can I help with?</h1>
            </div>
        </div>
        <div class="input-container">
            <div class="input-wrapper" id="inputWrapper">
                <textarea
                    id="messageInput"
                    class="input-field"
                    placeholder="Message ChatGPT"
                    rows="1"
                ></textarea>
                <button id="sendBtn" class="send-btn" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22,2 15,22 11,13 2,9"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatContainer = document.getElementById('chatContainer');
        const welcomeScreen = document.getElementById('welcomeScreen');

        const TRIGGER_QUESTION = "Is the U.S. crime rate currently at a historic high?";
        const SCRIPTED_ANSWER = "No, the U.S. crime rate is not at a historic high. Crime levels today are generally much lower than they were in the 1980s and early 1990s, when both violent and property crime peaked. While there have been short-term increases in certain years or cities, the overall long-term trend shows a significant decline.";
        const SOURCE_URL = "https://ourworldindata.org/us-crime-rates?utm_source=chatgpt.com";
        const SOURCE_LABEL = "Our World In Data";

        let isProcessing = false;

        function updateSendButton() {
            const hasText = messageInput.value.trim().length > 0;
            sendBtn.disabled = !hasText || isProcessing;
        }

        function autoResize() {
            messageInput.style.height = 'auto';
            messageInput.style.height = messageInput.scrollHeight + 'px';
        }

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function addUserMessage(content) {
            welcomeScreen.classList.add('hidden');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message user';
            messageDiv.textContent = content;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function createAssistantShell() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';

            const avatar = document.createElement('div');
            avatar.className = 'avatar assistant-avatar';
            avatar.textContent = 'AI';

            const messageContent = document.createElement('div');
            messageContent.className = 'message-content final-answer';

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(messageContent);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            return messageContent;
        }

        async function streamText(container, text) {
            // Stream text character by character into a <p> element
            const p = document.createElement('p');
            p.style.display = 'inline';
            container.appendChild(p);

            for (let i = 0; i < text.length; i++) {
                p.textContent += text[i];
                chatContainer.scrollTop = chatContainer.scrollHeight;
                // ~50% faster than before
                await delay(9 + Math.random() * 6);
            }

            return p;
        }

        async function handleTriggerQuestion(messageContent) {
            // Step 1: Show "…" typing indicator for 2s
            const typingIndicator = document.createElement('div');
            typingIndicator.className = 'typing-indicator';
            typingIndicator.innerHTML = '<span></span><span></span><span></span>';
            messageContent.appendChild(typingIndicator);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            await delay(2000);
            typingIndicator.remove();

            // Step 2: Show "Searching the web" for 3s
            const searchingCue = document.createElement('div');
            searchingCue.className = 'searching-cue';
            searchingCue.innerHTML = '<span class="search-icon">🔍</span> Searching the web';
            messageContent.appendChild(searchingCue);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            await delay(3000);
            searchingCue.remove();

            // Step 3: Stream the scripted answer, get back the <p> element
            const answerP = await streamText(messageContent, SCRIPTED_ANSWER);

            // Step 4: Add source bubble inline right after the final period
            const sourceLink = document.createElement('a');
            sourceLink.href = SOURCE_URL;
            sourceLink.target = '_blank';
            sourceLink.rel = 'noopener noreferrer';
            sourceLink.className = 'source-bubble';
            sourceLink.innerHTML = `<span class="source-icon">🔗</span>${SOURCE_LABEL}`;
            answerP.appendChild(sourceLink);

            // Add a block-level break after the inline paragraph so action buttons sit below
            const br = document.createElement('div');
            br.style.marginTop = '16px';
            messageContent.appendChild(br);
            messageContent.appendChild(sourceLink);

            // Step 5: Add action buttons
            const actionButtons = document.createElement('div');
            actionButtons.className = 'action-buttons';
            actionButtons.innerHTML = `
                <button class="action-btn" title="Copy">📋</button>
                <button class="action-btn" title="Thumbs up">👍</button>
                <button class="action-btn" title="Thumbs down">👎</button>
                <button class="action-btn" title="Share">↗️</button>
                <button class="action-btn" title="Regenerate">🔄</button>
                <button class="action-btn" title="More">⋯</button>
            `;
            br.appendChild(actionButtons);

            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function handleOtherMessage(messageContent) {
            // Brief typing indicator before showing the reminder
            const typingIndicator = document.createElement('div');
            typingIndicator.className = 'typing-indicator';
            typingIndicator.innerHTML = '<span></span><span></span><span></span>';
            messageContent.appendChild(typingIndicator);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            await delay(1000);
            typingIndicator.remove();

            const reminder = document.createElement('p');
            reminder.className = 'prompt-reminder';
            reminder.textContent = 'Please type in the assigned prompt.';
            messageContent.appendChild(reminder);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            if (isProcessing) return;

            const message = messageInput.value.trim();
            if (!message) return;

            isProcessing = true;
            updateSendButton();

            addUserMessage(message);
            messageInput.value = '';
            autoResize();

            const messageContent = createAssistantShell();

            const isTrigger = message.toLowerCase().trim() === TRIGGER_QUESTION.toLowerCase().trim();

            if (isTrigger) {
                await handleTriggerQuestion(messageContent);
            } else {
                await handleOtherMessage(messageContent);
            }

            isProcessing = false;
            updateSendButton();
        }

        // Event listeners
        messageInput.addEventListener('input', () => {
            updateSendButton();
            autoResize();
        });

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!sendBtn.disabled) {
                    sendMessage();
                }
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        // New chat button
        document.querySelector('.new-chat-btn').addEventListener('click', () => {
            chatContainer.innerHTML = '';
            const ws = document.createElement('div');
            ws.className = 'welcome-screen';
            ws.id = 'welcomeScreen';
            ws.innerHTML = '<h1 class="welcome-title">What can I help with?</h1>';
            chatContainer.appendChild(ws);
        });

        // Initialize
        updateSendButton();
    </script>
</body>
</html>
